<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MoltGrid — Dashboard</title>
<link rel="icon" type="image/x-icon" href="https://moltgrid.net/favicon/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="https://moltgrid.net/favicon/favicon-32x32.png">
<link rel="apple-touch-icon" sizes="180x180" href="https://moltgrid.net/favicon/apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f; --surface: #12121a; --surface2: #1a1a26; --border: #2a2a3a;
  --text: #e4e4ef; --text-dim: #7a7a92; --accent: #ff3333; --accent-dim: #cc2828;
  --accent-glow: rgba(255,51,51,0.15); --red: #ff4444; --yellow: #ffcc00; --blue: #4488ff;
  --purple: #bb88ff; --green: #44cc66;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Space Grotesk',sans-serif; line-height:1.6; min-height:100vh; }
.noise { position:fixed; top:0;left:0;right:0;bottom:0; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E"); pointer-events:none; z-index:999; }
.grid-bg { position:fixed; top:0;left:0;right:0;bottom:0; background-image:linear-gradient(rgba(255,51,51,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,51,51,0.03) 1px,transparent 1px); background-size:60px 60px; pointer-events:none; }

header { position:fixed; top:0; width:100%; padding:0.75rem 2rem; background:rgba(10,10,15,0.9); backdrop-filter:blur(20px); border-bottom:1px solid var(--border); z-index:100; display:flex; justify-content:space-between; align-items:center; }
.logo { font-family:'JetBrains Mono',monospace; font-weight:700; font-size:1.2rem; color:var(--accent); text-decoration:none; cursor:pointer; }
.logo span { color:var(--text-dim); }
.header-right { display:flex; align-items:center; gap:1rem; }
.tier-badge { font-family:'JetBrains Mono',monospace; font-size:0.65rem; padding:3px 10px; border-radius:12px; text-transform:uppercase; letter-spacing:1px; }
.tier-free { color:var(--text-dim); background:rgba(122,122,146,0.12); border:1px solid var(--border); }
.tier-hobby { color:var(--blue); background:rgba(68,136,255,0.1); border:1px solid rgba(68,136,255,0.2); }
.tier-team { color:var(--purple); background:rgba(187,136,255,0.1); border:1px solid rgba(187,136,255,0.2); }
.tier-scale { color:var(--yellow); background:rgba(255,204,0,0.1); border:1px solid rgba(255,204,0,0.2); }
.user-email { font-family:'JetBrains Mono',monospace; font-size:0.75rem; color:var(--text-dim); }
.btn { font-family:'JetBrains Mono',monospace; font-size:0.75rem; padding:6px 14px; border-radius:6px; cursor:pointer; border:none; transition:all 0.2s; }
.btn-ghost { background:transparent; color:var(--text-dim); border:1px solid var(--border); }
.btn-ghost:hover { border-color:var(--red); color:var(--red); }
.btn-accent { background:var(--accent); color:#fff; }
.btn-accent:hover { background:var(--accent-dim); }
.btn-accent:disabled { opacity:0.4; cursor:not-allowed; }

.page { position:relative; z-index:10; padding:2.5rem 2rem 3rem; max-width:1100px; margin:0 auto; }

/* Auth pages */
.auth-page-wrap { display:flex; flex-direction:column; min-height:100vh; }
.auth-page-header { padding:1.25rem 2rem; border-bottom:1px solid var(--border); }
.auth-logo { text-decoration:none; display:inline-block; }
.auth-container { display:flex; align-items:center; justify-content:center; flex:1; padding:2rem; }
.auth-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:2.5rem; width:100%; max-width:400px; }
.auth-card h1 { font-size:1.4rem; font-weight:600; letter-spacing:-0.5px; margin-bottom:0.25rem; }
.auth-card .subtitle { color:var(--text-dim); font-size:0.8rem; margin-bottom:1.5rem; font-family:'JetBrains Mono',monospace; }
.form-group { margin-bottom:1rem; }
.form-group label { display:block; font-family:'JetBrains Mono',monospace; font-size:0.65rem; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px; margin-bottom:0.35rem; }
.form-group input { width:100%; background:var(--bg); border:1px solid var(--border); color:var(--text); padding:10px 14px; border-radius:8px; font-family:'JetBrains Mono',monospace; font-size:0.85rem; outline:none; transition:border-color 0.2s; }
.form-group input:focus { border-color:var(--accent); }
.form-group input.error { border-color:var(--red); }
.form-error { color:var(--red); font-family:'JetBrains Mono',monospace; font-size:0.7rem; margin-top:0.25rem; }
.form-submit { width:100%; margin-top:0.5rem; padding:11px; font-size:0.85rem; }
.auth-link { text-align:center; margin-top:1.25rem; font-size:0.8rem; color:var(--text-dim); }
.auth-link a { color:var(--accent); text-decoration:none; cursor:pointer; }
.auth-link a:hover { text-decoration:underline; }
.auth-page-footer { padding:1.25rem 2rem; border-top:1px solid var(--border); display:flex; gap:1.5rem; justify-content:center; font-family:'JetBrains Mono',monospace; font-size:0.7rem; }
.auth-page-footer a { color:var(--text-dim); text-decoration:none; transition:color 0.15s; }
.auth-page-footer a:hover { color:var(--accent); }
.alert { padding:10px 14px; border-radius:8px; font-family:'JetBrains Mono',monospace; font-size:0.75rem; margin-bottom:1rem; }
.alert-error { background:rgba(255,68,68,0.1); border:1px solid rgba(255,68,68,0.2); color:var(--red); }

/* Agent cards */
.dash-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem; flex-wrap:wrap; gap:1rem; }
.dash-header h1 { font-size:1.5rem; font-weight:600; letter-spacing:-1px; }
.agent-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:1rem; }
.agent-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.25rem; transition:all 0.2s; }
.agent-card:hover { border-color:rgba(255,51,51,0.3); }
.agent-card-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:0.75rem; }
.agent-name { font-weight:600; font-size:1rem; }
.agent-id { font-family:'JetBrains Mono',monospace; font-size:0.7rem; color:var(--text-dim); margin-top:2px; }
.status-indicator { display:flex; align-items:center; gap:6px; font-family:'JetBrains Mono',monospace; font-size:0.65rem; }
.status-dot { width:8px; height:8px; border-radius:50%; }
.status-dot.online { background:var(--green); box-shadow:0 0 8px rgba(68,204,102,0.4); }
.status-dot.offline { background:var(--text-dim); }
.agent-stats { display:grid; grid-template-columns:1fr 1fr; gap:0.5rem; margin-top:0.75rem; }
.agent-stat { background:var(--bg); border-radius:6px; padding:0.5rem 0.7rem; }
.agent-stat-label { font-family:'JetBrains Mono',monospace; font-size:0.55rem; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px; }
.agent-stat-value { font-family:'JetBrains Mono',monospace; font-size:0.85rem; color:var(--text); margin-top:2px; }

/* Modal */
.modal-overlay { display:none; position:fixed; top:0;left:0;right:0;bottom:0; background:rgba(0,0,0,0.75); z-index:200; align-items:center; justify-content:center; }
.modal-overlay.active { display:flex; }
.modal { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:2rem; max-width:520px; width:92%; }
.modal h2 { font-size:1.1rem; margin-bottom:0.5rem; }
.modal .subtitle { color:var(--text-dim); font-size:0.8rem; margin-bottom:1.25rem; }
.api-key-box { background:var(--bg); border:1px solid var(--accent); border-radius:8px; padding:12px 16px; font-family:'JetBrains Mono',monospace; font-size:0.8rem; color:var(--accent); word-break:break-all; margin-bottom:1rem; position:relative; }
.copy-btn { position:absolute; top:8px; right:8px; background:var(--surface2); border:1px solid var(--border); color:var(--text-dim); font-family:'JetBrains Mono',monospace; font-size:0.65rem; padding:4px 10px; border-radius:4px; cursor:pointer; }
.copy-btn:hover { border-color:var(--accent); color:var(--accent); }
.warning-text { color:var(--yellow); font-family:'JetBrains Mono',monospace; font-size:0.7rem; margin-bottom:1rem; }
.modal-actions { display:flex; gap:0.75rem; justify-content:flex-end; }

/* Agent detail page */
.back-link { font-family:'JetBrains Mono',monospace; font-size:0.75rem; color:var(--text-dim); cursor:pointer; display:inline-flex; align-items:center; gap:6px; margin-bottom:1.25rem; transition:color 0.2s; }
.back-link:hover { color:var(--accent); }
.detail-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:1.5rem; flex-wrap:wrap; gap:1rem; }
.detail-header h1 { font-size:1.5rem; font-weight:600; letter-spacing:-1px; margin-bottom:0.15rem; }
.detail-header .agent-id { font-family:'JetBrains Mono',monospace; font-size:0.75rem; color:var(--text-dim); cursor:pointer; display:inline-flex; align-items:center; gap:6px; }
.detail-header .agent-id:hover { color:var(--accent); }
.edit-name-btn { background:none; border:none; color:var(--text-dim); cursor:pointer; font-size:0.85rem; padding:2px 6px; border-radius:4px; vertical-align:middle; transition:color 0.15s,background 0.15s; margin-left:4px; line-height:1; }
.edit-name-btn:hover { color:var(--accent); background:rgba(255,51,51,0.08); }
.name-error { font-family:'JetBrains Mono',monospace; font-size:0.7rem; color:var(--red); margin-top:6px; min-height:1em; }
.activity-item.clickable { cursor:pointer; }
.activity-item.clickable:hover { background:rgba(255,255,255,0.04); border-radius:6px; }
.activity-filter-bar { display:flex; gap:0.5rem; margin-bottom:1rem; flex-wrap:wrap; }
.filter-btn { background:none; border:1px solid var(--border); color:var(--text-dim); cursor:pointer; font-size:0.75rem; padding:4px 10px; border-radius:20px; font-family:'JetBrains Mono',monospace; transition:all 0.15s; }
.filter-btn:hover { border-color:var(--accent); color:var(--accent); }
.filter-btn.active { border-color:var(--accent); color:var(--accent); background:rgba(255,51,51,0.1); }
.load-more-btn { width:100%; background:none; border:1px dashed var(--border); color:var(--text-dim); cursor:pointer; padding:8px; border-radius:6px; font-size:0.8rem; margin-top:0.5rem; transition:all 0.15s; }
.load-more-btn:hover { border-color:var(--accent); color:var(--accent); }
.detail-field { margin-bottom:0.75rem; }
.detail-field label { display:block; font-size:0.7rem; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:3px; }
.detail-value { font-family:'JetBrains Mono',monospace; font-size:0.8rem; color:var(--text); word-break:break-all; background:var(--bg); padding:6px 8px; border-radius:4px; border:1px solid var(--border); white-space:pre-wrap; max-height:200px; overflow:auto; }
.status-pill { display:inline-block; padding:2px 8px; border-radius:10px; font-size:0.7rem; font-family:'JetBrains Mono',monospace; }
.status-pill.completed { background:rgba(0,255,136,0.1); color:#00ff88; }
.status-pill.failed { background:rgba(255,51,51,0.1); color:var(--accent); }
.status-pill.pending { background:rgba(255,255,0,0.1); color:#ffff00; }
.status-pill.running { background:rgba(100,200,255,0.1); color:#64c8ff; }
.detail-row { display:flex; gap:1rem; }
.detail-row .detail-field { flex:1; }
.agent-picker { position:relative; user-select:none; }
.agent-picker-input { background:rgba(255,255,255,0.05); border:1px solid var(--border); border-radius:6px; padding:8px 10px; color:var(--text); cursor:pointer; font-size:0.85rem; display:flex; align-items:center; gap:6px; min-height:38px; }
.agent-picker-input:focus, .agent-picker-input.open { border-color:var(--accent); outline:none; }
.agent-picker-input .ap-name { flex:1; }
.agent-picker-input .ap-id-inline { font-family:'JetBrains Mono',monospace; font-size:0.7rem; color:var(--text-dim); }
.agent-picker-input .chevron { color:var(--text-dim); font-size:0.65rem; margin-left:auto; }
.agent-picker-list { display:none; position:absolute; z-index:200; top:calc(100% + 3px); left:0; right:0; background:#1a1a1a; border:1px solid var(--border); border-radius:6px; max-height:220px; overflow:hidden; box-shadow:0 8px 24px rgba(0,0,0,0.5); flex-direction:column; }
.agent-picker-list.open { display:flex; }
.agent-picker-search { width:100%; box-sizing:border-box; background:rgba(255,255,255,0.04); border:none; border-bottom:1px solid var(--border); padding:8px 10px; color:var(--text); font-family:'JetBrains Mono',monospace; font-size:0.8rem; outline:none; flex-shrink:0; }
.agent-picker-items { overflow-y:auto; }
.agent-picker-item { padding:8px 10px; cursor:pointer; border-bottom:1px solid rgba(255,255,255,0.04); }
.agent-picker-item:last-child { border-bottom:none; }
.agent-picker-item:hover, .agent-picker-item.focused { background:rgba(255,51,51,0.08); }
.agent-picker-item .ap-name { font-size:0.85rem; color:var(--text); }
.agent-picker-item .ap-id { font-size:0.7rem; color:var(--text-dim); font-family:'JetBrains Mono',monospace; margin-top:1px; }
.agent-picker-empty { padding:12px 10px; color:var(--text-dim); font-size:0.8rem; text-align:center; }
.toast { position:fixed; bottom:1.5rem; right:1.5rem; padding:12px 18px; border-radius:8px; font-size:0.85rem; font-family:'JetBrains Mono',monospace; z-index:9999; opacity:0; transform:translateY(8px); transition:opacity 0.2s,transform 0.2s; pointer-events:none; max-width:320px; }
.toast.show { opacity:1; transform:translateY(0); }
.toast.success { background:#0f2a1a; border:1px solid #00ff88; color:#00ff88; }
.toast.error { background:#2a0f0f; border:1px solid var(--accent); color:var(--accent); }
.toast.info { background:#0f1a2a; border:1px solid #64c8ff; color:#64c8ff; }
.detail-meta { font-family:'JetBrains Mono',monospace; font-size:0.7rem; color:var(--text-dim); margin-top:4px; }
.status-badge-lg { font-family:'JetBrains Mono',monospace; font-size:0.7rem; padding:4px 12px; border-radius:14px; display:inline-flex; align-items:center; gap:6px; }
.status-online { color:var(--green); background:rgba(68,204,102,0.1); border:1px solid rgba(68,204,102,0.2); }
.status-offline { color:var(--text-dim); background:rgba(122,122,146,0.08); border:1px solid var(--border); }
.status-busy { color:var(--yellow); background:rgba(255,204,0,0.1); border:1px solid rgba(255,204,0,0.2); }

.stats-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:0.75rem; margin-bottom:1.75rem; }
.stat-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:1rem; }
.stat-card:hover { border-color:rgba(255,51,51,0.3); }
.stat-card .label { font-family:'JetBrains Mono',monospace; font-size:0.6rem; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px; margin-bottom:0.3rem; }
.stat-card .value { font-size:1.5rem; font-weight:700; font-family:'JetBrains Mono',monospace; }
.stat-card .value.red { color:var(--accent); }
.stat-card .value.blue { color:var(--blue); }
.stat-card .value.purple { color:var(--purple); }
.stat-card .value.yellow { color:var(--yellow); }
.stat-card .sub { font-family:'JetBrains Mono',monospace; font-size:0.65rem; color:var(--text-dim); margin-top:2px; }

.section-title { font-family:'JetBrains Mono',monospace; font-size:0.7rem; color:var(--text-dim); text-transform:uppercase; letter-spacing:1.5px; margin-bottom:0.75rem; display:flex; align-items:center; gap:8px; }
.section-title .refresh-dot { width:6px; height:6px; background:var(--green); border-radius:50%; animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

.activity-list { background:var(--surface); border:1px solid var(--border); border-radius:10px; overflow:hidden; margin-bottom:1.75rem; }
.activity-item { display:flex; align-items:flex-start; gap:12px; padding:0.75rem 1rem; border-bottom:1px solid var(--border); font-size:0.8rem; transition:background 0.1s; }
.activity-item:last-child { border-bottom:none; }
.activity-item:hover { background:rgba(255,51,51,0.03); }
.activity-icon { font-size:1rem; flex-shrink:0; width:24px; text-align:center; line-height:1.4; }
.activity-text { flex:1; color:var(--text); }
.activity-text .dim { color:var(--text-dim); font-family:'JetBrains Mono',monospace; font-size:0.7rem; }
.activity-time { font-family:'JetBrains Mono',monospace; font-size:0.65rem; color:var(--text-dim); white-space:nowrap; flex-shrink:0; }

.actions-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:0.75rem; margin-bottom:1.75rem; }
.action-btn { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:1rem; cursor:pointer; transition:all 0.2s; text-align:left; }
.action-btn:hover { border-color:rgba(255,51,51,0.3); }
.action-btn.disabled { opacity:0.4; cursor:not-allowed; }
.action-btn .action-icon { font-size:1.2rem; margin-bottom:0.4rem; }
.action-btn .action-label { font-family:'JetBrains Mono',monospace; font-size:0.75rem; color:var(--text); font-weight:500; }
.action-btn .action-desc { font-size:0.7rem; color:var(--text-dim); margin-top:2px; }
.action-btn-danger:hover { border-color:rgba(255,68,68,0.4); background:rgba(255,68,68,0.04); }

.usage-bar-wrap { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:1.25rem; margin-bottom:1.75rem; }
.usage-bar-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:0.75rem; }
.usage-bar-header .label { font-family:'JetBrains Mono',monospace; font-size:0.7rem; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px; }
.usage-bar-header .count { font-family:'JetBrains Mono',monospace; font-size:0.85rem; font-weight:600; }
.usage-track { background:var(--bg); border-radius:6px; height:10px; overflow:hidden; }
.usage-fill { height:100%; border-radius:6px; transition:width 0.5s ease; }
.usage-fill.green { background:var(--green); }
.usage-fill.yellow { background:var(--yellow); }
.usage-fill.red { background:var(--red); }

.modal textarea { width:100%; background:var(--bg); border:1px solid var(--border); color:var(--text); padding:10px 14px; border-radius:8px; font-family:'JetBrains Mono',monospace; font-size:0.8rem; outline:none; resize:vertical; min-height:80px; }
.modal textarea:focus { border-color:var(--accent); }

/* Billing page */
.billing-grid { display:grid; grid-template-columns:1fr; gap:1.5rem; }
.plan-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:1.75rem; }
.plan-card-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:1rem; }
.plan-name { font-size:1.5rem; font-weight:700; letter-spacing:-1px; display:flex; align-items:center; gap:0.75rem; }
.plan-price { font-family:'JetBrains Mono',monospace; font-size:1.2rem; font-weight:700; }
.plan-price .period { font-size:0.7rem; color:var(--text-dim); font-weight:400; }
.plan-detail { font-family:'JetBrains Mono',monospace; font-size:0.75rem; color:var(--text-dim); margin-bottom:0.5rem; }

.tiers-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:1rem; margin-top:1.5rem; }
.tier-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.5rem; display:flex; flex-direction:column; transition:all 0.2s; position:relative; }
.tier-card:hover { border-color:rgba(255,51,51,0.3); }
.tier-card.current { border-color:var(--accent); box-shadow:0 0 20px var(--accent-glow); }
.tier-card.current::after { content:"CURRENT"; position:absolute; top:-10px; right:12px; font-family:'JetBrains Mono',monospace; font-size:0.55rem; background:var(--accent); color:#fff; padding:2px 10px; border-radius:10px; letter-spacing:1px; }
.tier-card-name { font-size:1.1rem; font-weight:700; margin-bottom:0.25rem; }
.tier-card-price { font-family:'JetBrains Mono',monospace; font-size:1.4rem; font-weight:700; margin-bottom:0.75rem; }
.tier-card-price .mo { font-size:0.7rem; color:var(--text-dim); font-weight:400; }
.tier-card-features { list-style:none; margin-bottom:1.25rem; flex:1; }
.tier-card-features li { font-family:'JetBrains Mono',monospace; font-size:0.7rem; color:var(--text-dim); padding:3px 0; }
.tier-card-features li::before { content:"\2713 "; color:var(--green); }
.tier-card .btn { width:100%; text-align:center; }

.billing-history { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.5rem; margin-top:1.5rem; }
.billing-history .label { font-family:'JetBrains Mono',monospace; font-size:0.7rem; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px; margin-bottom:0.75rem; }

/* Billing result pages */
.result-container { display:flex; align-items:center; justify-content:center; min-height:80vh; padding:2rem; }
.result-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:2.5rem; text-align:center; max-width:460px; width:100%; }
.result-icon { font-size:3rem; margin-bottom:1rem; }
.result-card h1 { font-size:1.4rem; font-weight:600; margin-bottom:0.5rem; }
.result-card .subtitle { color:var(--text-dim); font-family:'JetBrains Mono',monospace; font-size:0.8rem; margin-bottom:1.5rem; }

/* Upgrade banner */
.upgrade-banner { background:rgba(255,204,0,0.08); border:1px solid rgba(255,204,0,0.2); border-radius:10px; padding:0.75rem 1.25rem; display:flex; align-items:center; justify-content:space-between; gap:1rem; margin-bottom:1.5rem; font-family:'JetBrains Mono',monospace; font-size:0.75rem; color:var(--yellow); }
.upgrade-banner a { color:var(--accent); text-decoration:none; font-weight:600; white-space:nowrap; cursor:pointer; }
.upgrade-banner a:hover { text-decoration:underline; }

.upgrade-cta-inline { font-family:'JetBrains Mono',monospace; font-size:0.75rem; color:var(--accent); cursor:pointer; margin-top:0.5rem; }
.upgrade-cta-inline:hover { text-decoration:underline; }
.header-upgrade { font-family:'JetBrains Mono',monospace; font-size:0.65rem; color:var(--accent); cursor:pointer; text-decoration:none; padding:3px 10px; border:1px solid rgba(255,51,51,0.3); border-radius:12px; transition:all 0.2s; }
.header-upgrade:hover { background:rgba(255,51,51,0.1); border-color:var(--accent); }

/* Empty state */
.empty-state { text-align:center; padding:4rem 2rem; }
.empty-state .icon { font-size:2.5rem; margin-bottom:1rem; opacity:0.3; }
.empty-state p { color:var(--text-dim); font-family:'JetBrains Mono',monospace; font-size:0.85rem; margin-bottom:1.5rem; }

/* Loading */
.spinner { width:18px; height:18px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; display:inline-block; vertical-align:middle; margin-right:8px; }
@keyframes spin { to{transform:rotate(360deg)} }
.loading-page { display:flex; align-items:center; justify-content:center; min-height:60vh; font-family:'JetBrains Mono',monospace; color:var(--text-dim); }

@media(max-width:600px) {
  .page { padding:2.5rem 1rem 2rem; }
  .agent-grid { grid-template-columns:1fr; }
  .auth-card { padding:1.5rem; }
}
/* ── Tabs ── */
.tab-bar { display:flex; gap:0; border-bottom:1px solid var(--border); margin:1.25rem 0 0; overflow-x:auto; scrollbar-width:none; }
.tab-btn { background:none; border:none; border-bottom:2px solid transparent; color:var(--text-dim); cursor:pointer; font-family:'JetBrains Mono',monospace; font-size:0.78rem; padding:10px 16px; white-space:nowrap; transition:color 0.15s,border-color 0.15s; }
.tab-btn:hover { color:var(--text); }
.tab-btn.active { color:var(--accent); border-bottom-color:var(--accent); }
#tab-content { padding-top:1.25rem; min-height:200px; }
.data-table { width:100%; border-collapse:collapse; font-size:0.82rem; }
.data-table th { text-align:left; color:var(--text-dim); font-size:0.68rem; text-transform:uppercase; letter-spacing:0.05em; padding:6px 10px; border-bottom:1px solid var(--border); white-space:nowrap; }
.data-table td { padding:8px 10px; border-bottom:1px solid rgba(255,255,255,0.04); vertical-align:middle; }
.data-table tr.clickable:hover td { background:rgba(255,255,255,0.025); cursor:pointer; }
.data-table td.mono { font-family:'JetBrains Mono',monospace; font-size:0.75rem; color:var(--text-dim); }
.data-table td.preview { max-width:220px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-family:'JetBrains Mono',monospace; font-size:0.72rem; color:var(--text-dim); }
.tab-toolbar { display:flex; gap:0.5rem; align-items:center; margin-bottom:0.8rem; flex-wrap:wrap; }
.tab-search { background:rgba(255,255,255,0.05); border:1px solid var(--border); border-radius:6px; color:var(--text); font-family:'JetBrains Mono',monospace; font-size:0.8rem; padding:6px 10px; min-width:160px; outline:none; }
.tab-search:focus { border-color:var(--accent); }
.tab-empty { text-align:center; color:var(--text-dim); padding:2rem 0; font-size:0.85rem; }
.tab-pagination { display:flex; align-items:center; gap:0.5rem; margin-top:0.75rem; font-size:0.8rem; color:var(--text-dim); }
.settings-section { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:1.25rem; margin-bottom:1rem; }
.settings-section h3 { font-family:'JetBrains Mono',monospace; font-size:0.82rem; font-weight:600; margin:0 0 0.5rem; }
.settings-section p { font-size:0.8rem; color:var(--text-dim); margin:0 0 0.75rem; line-height:1.5; }
.settings-danger { border-color:rgba(255,51,51,0.25); }
.toggle-switch { position:relative; display:inline-block; width:36px; height:20px; vertical-align:middle; cursor:pointer; }
.toggle-switch input { opacity:0; width:0; height:0; position:absolute; }
.toggle-slider { position:absolute; inset:0; background:#333; border-radius:20px; transition:background 0.2s; }
.toggle-slider:before { content:''; position:absolute; height:14px; width:14px; left:3px; bottom:3px; background:#fff; border-radius:50%; transition:transform 0.2s; }
input:checked + .toggle-slider { background:var(--accent); }
input:checked + .toggle-slider:before { transform:translateX(16px); }
/* ── Memory visibility ── */
.vis-badge { display:inline-block; padding:2px 7px; border-radius:10px; font-size:0.68rem; font-family:'JetBrains Mono',monospace; font-weight:500; letter-spacing:0.02em; }
.vis-badge.private  { background:rgba(255,255,255,0.07); color:var(--text-dim); }
.vis-badge.public   { background:rgba(0,255,136,0.12); color:#00ff88; }
.vis-badge.shared   { background:rgba(0,170,255,0.12); color:#00aaff; }
.mem-checkbox { accent-color:var(--accent); width:14px; height:14px; cursor:pointer; vertical-align:middle; }
.bulk-action-bar { display:flex; align-items:center; gap:0.75rem; padding:6px 0; flex-wrap:wrap; }
.audit-log-row { display:flex; align-items:center; gap:0.5rem; padding:5px 0; border-bottom:1px solid rgba(255,255,255,0.04); font-size:0.75rem; }
.audit-action { font-family:'JetBrains Mono',monospace; font-size:0.68rem; padding:1px 6px; border-radius:8px; background:rgba(255,255,255,0.06); }
/* ── Charts ── */
.charts-grid { display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-bottom:1.5rem; }
@media(max-width:700px){ .charts-grid { grid-template-columns:1fr; } }
.chart-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:1rem; }
.chart-card .chart-title { font-family:'JetBrains Mono',monospace; font-size:0.7rem; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:0.6rem; }
.chart-wrap { position:relative; height:140px; }
.chart-period-bar { display:flex; gap:0.4rem; margin-bottom:0.75rem; }
.chart-period-btn { background:none; border:1px solid var(--border); color:var(--text-dim); cursor:pointer; font-size:0.72rem; padding:3px 10px; border-radius:4px; font-family:'JetBrains Mono',monospace; transition:all 0.15s; }
.chart-period-btn:hover { border-color:var(--accent); color:var(--accent); }
.chart-period-btn.active { border-color:var(--accent); color:var(--accent); background:rgba(255,51,51,0.1); }
/* ── Clickable stat cards ── */
.stat-card.clickable { cursor:pointer; transition:border-color 0.15s, background 0.15s; }
.stat-card.clickable:hover { border-color:rgba(255,51,51,0.3); background:rgba(255,51,51,0.03); }
/* ── Overview page ── */
.overview-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:1rem; margin-bottom:1.5rem; }
.ov-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:1rem; text-align:center; }
.ov-card .ov-val { font-size:2rem; font-weight:700; font-family:'JetBrains Mono',monospace; line-height:1.1; }
.ov-card .ov-label { font-size:0.7rem; color:var(--text-dim); margin-top:4px; }
.agents-table { width:100%; border-collapse:collapse; font-size:0.82rem; }
.agents-table th { text-align:left; color:var(--text-dim); font-size:0.68rem; text-transform:uppercase; letter-spacing:0.05em; padding:6px 10px; border-bottom:1px solid var(--border); }
.agents-table td { padding:8px 10px; border-bottom:1px solid rgba(255,255,255,0.04); }
.agents-table tr:hover td { background:rgba(255,255,255,0.02); }
.agents-table td:last-child { text-align:right; }
.heartbeat-time { font-size:0.7rem; color:var(--text-dim); margin-top:1px; }

/* ── Sidebar layout ── */
.dashboard-shell { display:flex; min-height:100vh; }
.sidebar { position:fixed; top:0; left:0; width:210px; height:100vh; background:var(--bg); border-right:1px solid var(--border); display:flex; flex-direction:column; z-index:110; transition:transform 0.25s; }
.sidebar-logo { padding:1.1rem 1.25rem 0.9rem; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:0.5rem; cursor:pointer; }
.sidebar-logo img { height:26px; }
.sidebar-nav { flex:1; overflow-y:auto; padding:0.75rem 0; }
.sidebar-item { display:flex; align-items:center; gap:0.65rem; padding:0.55rem 1.25rem; font-family:'JetBrains Mono',monospace; font-size:0.78rem; color:var(--text-dim); cursor:pointer; border-left:3px solid transparent; transition:all 0.15s; text-decoration:none; }
.sidebar-item:hover { color:var(--text); background:var(--surface); }
.sidebar-item.active { color:var(--accent); border-left-color:var(--accent); background:var(--accent-glow); }
.sidebar-item .si-icon { font-size:0.95rem; flex-shrink:0; width:18px; text-align:center; }
.sidebar-divider { height:1px; background:var(--border); margin:0.5rem 1.25rem; }
.sidebar-footer { padding:0.85rem 1.25rem; border-top:1px solid var(--border); }
.sidebar-footer .sf-email { font-family:'JetBrains Mono',monospace; font-size:0.68rem; color:var(--text-dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:4px; }
.sidebar-footer .sf-tier { font-family:'JetBrains Mono',monospace; font-size:0.6rem; display:inline-block; padding:2px 8px; border-radius:10px; text-transform:uppercase; letter-spacing:1px; }
.sidebar-footer .sf-logout { font-family:'JetBrains Mono',monospace; font-size:0.68rem; color:var(--text-dim); cursor:pointer; margin-top:0.5rem; display:inline-block; border:none; background:none; padding:0; transition:color 0.15s; }
.sidebar-footer .sf-logout:hover { color:var(--accent); }
.main-content { margin-left:210px; flex:1; min-width:0; }

/* Hamburger for mobile */
.sidebar-toggle { display:none; position:fixed; top:0.85rem; left:1rem; z-index:120; background:var(--bg); border:1px solid var(--border); border-radius:6px; color:var(--text); font-size:1.1rem; width:36px; height:36px; cursor:pointer; align-items:center; justify-content:center; }
.sidebar-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:109; }

@media(max-width:700px) {
  .sidebar { transform:translateX(-100%); }
  .sidebar.open { transform:translateX(0); }
  .sidebar-toggle { display:flex; }
  .sidebar-overlay.active { display:block; }
  .main-content { margin-left:0; }
  header { padding-left:3.5rem; }
}

/* ── Breadcrumbs ── */
.breadcrumb { font-family:'JetBrains Mono',monospace; font-size:0.7rem; color:var(--text-dim); margin-bottom:1.1rem; display:flex; align-items:center; gap:0.35rem; flex-wrap:wrap; }
.breadcrumb .bc-link { color:var(--accent); cursor:pointer; text-decoration:none; transition:opacity 0.15s; }
.breadcrumb .bc-link:hover { opacity:0.75; }
.breadcrumb .bc-sep { color:var(--border); }
.breadcrumb .bc-current { color:var(--text-dim); }
</style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<div class="noise"></div>
<div class="grid-bg"></div>
<div id="app"></div>

<script>
(function() {
  "use strict";

  // ── State ──
  var token = localStorage.getItem("mg_token") || null;
  var user = null;
  var API = window.location.origin;

  // ── API helper ──
  function api(method, path, body) {
    var opts = { method: method, headers: {} };
    if (token) opts.headers["Authorization"] = "Bearer " + token;
    if (body) {
      opts.headers["Content-Type"] = "application/json";
      opts.body = JSON.stringify(body);
    }
    return fetch(API + path, opts).then(function(r) {
      return r.json().catch(function() { return {}; }).then(function(data) {
        if (!r.ok) throw { status: r.status, detail: data.detail || "Request failed" };
        return data;
      });
    });
  }

  // ── Router ──
  function navigate(hash) { window.location.hash = hash; }
  window.navigate = navigate; // expose for onclick handlers in innerHTML

  function route() {
    var hash = window.location.hash || "#/login";
    var app = document.getElementById("app");

    if (hash === "#/login") return renderLogin(app);
    if (hash === "#/signup") return renderSignup(app);

    // Auth guard
    if (!token) return navigate("#/login");
    if (hash === "#/agents") return renderAgents(app);
    if (hash === "#/overview") return renderOverview(app);
    if (hash === "#/network") return renderNetwork(app);
    if (hash === "#/billing") return renderBilling(app);
    if (hash === "#/billing/success") return renderBillingSuccess(app);
    if (hash === "#/billing/cancel") return renderBillingCancel(app);
    if (hash === "#/billing/failed") return renderBillingFailed(app);

    // Agent detail: #/agents/agent_xxxx
    var m = hash.match(/^#\/agents\/(agent_[a-f0-9]+)$/);
    if (m) return renderAgentDetail(app, m[1]);

    // 404 — unknown route
    app.innerHTML =
      '<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem">' +
      '<div style="text-align:center;max-width:400px">' +
      '<div style="font-size:4rem;margin-bottom:1rem;opacity:0.3">404</div>' +
      '<h2 style="font-size:1.3rem;margin-bottom:0.5rem">Page Not Found</h2>' +
      '<p style="color:var(--text-dim);font-family:JetBrains Mono,monospace;font-size:0.8rem;margin-bottom:1.5rem">The page you are looking for does not exist.</p>' +
      '<button class="btn btn-accent" onclick="navigate(\'#/agents\')">Go Home</button>' +
      '</div></div>';
  }

  window.addEventListener("hashchange", route);

  // ── Time ago helper ──
  function timeAgo(iso) {
    if (!iso) return "never";
    var s = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
    if (s < 60) return s + "s ago";
    if (s < 3600) return Math.floor(s/60) + "m ago";
    if (s < 86400) return Math.floor(s/3600) + "h ago";
    return Math.floor(s/86400) + "d ago";
  }

  function esc(str) {
    var d = document.createElement("div");
    d.textContent = str || "";
    return d.innerHTML;
  }

  function truncId(id) { return id ? id.slice(0, 18) + "\u2026" : ""; }

  // ── Login Page ──
  function renderLogin(app) {
    app.innerHTML =
      '<div class="auth-page-wrap">' +
      '<div class="auth-page-header"><a href="https://moltgrid.net" class="auth-logo"><img src="https://moltgrid.net/public/logo-full.png" alt="MoltGrid" style="height:28px"></a></div>' +
      '<div class="auth-container"><div class="auth-card">' +
      '<h1>Welcome back</h1>' +
      '<p class="subtitle">Sign in to your MoltGrid account</p>' +
      '<div id="login-alert"></div>' +
      '<form id="login-form">' +
      '<div class="form-group"><label>Email</label>' +
      '<input type="email" id="login-email" placeholder="you@example.com" required autocomplete="email"></div>' +
      '<div class="form-group"><label>Password</label>' +
      '<input type="password" id="login-password" placeholder="\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022" required autocomplete="current-password"></div>' +
      '<button type="submit" class="btn btn-accent form-submit" id="login-btn">Sign in</button>' +
      '</form>' +
      '<p class="auth-link">Don\'t have an account? <a id="go-signup">Sign up</a></p>' +
      '</div></div>' +
      '<div class="auth-page-footer">' +
      '<a href="https://moltgrid.net/contact.html">Contact</a>' +
      '<a href="https://moltgrid.net/docs">Docs</a>' +
      '<a href="https://github.com/D0NMEGA/MoltGrid" target="_blank" rel="noopener">GitHub</a>' +
      '</div>' +
      '</div>';

    document.getElementById("go-signup").onclick = function() { navigate("#/signup"); };

    document.getElementById("login-form").onsubmit = function(e) {
      e.preventDefault();
      var btn = document.getElementById("login-btn");
      var alertEl = document.getElementById("login-alert");
      btn.disabled = true; btn.textContent = "Signing in\u2026";
      alertEl.innerHTML = "";
      api("POST", "/v1/auth/login", {
        email: document.getElementById("login-email").value,
        password: document.getElementById("login-password").value,
      }).then(function(data) {
        token = data.token;
        localStorage.setItem("mg_token", token);
        return api("GET", "/v1/auth/me");
      }).then(function(me) {
        user = me;
        navigate("#/agents");
      }).catch(function(err) {
        alertEl.innerHTML = '<div class="alert alert-error">' + esc(err.detail || "Network error. Check your connection.") + "</div>";
        btn.disabled = false; btn.textContent = "Sign in";
      });
    };
  }

  // ── Signup Page ──
  function renderSignup(app) {
    app.innerHTML =
      '<div class="auth-container"><div class="auth-card">' +
      '<h1>Create account</h1>' +
      '<p class="subtitle">Start building with MoltGrid \u2014 free</p>' +
      '<div id="signup-alert"></div>' +
      '<form id="signup-form">' +
      '<div class="form-group"><label>Display Name</label>' +
      '<input type="text" id="signup-name" placeholder="Your name" autocomplete="name"></div>' +
      '<div class="form-group"><label>Email</label>' +
      '<input type="email" id="signup-email" placeholder="you@example.com" required autocomplete="email">' +
      '<div class="form-error" id="err-email"></div></div>' +
      '<div class="form-group"><label>Password</label>' +
      '<input type="password" id="signup-password" placeholder="Min 8 characters" required autocomplete="new-password">' +
      '<div class="form-error" id="err-password"></div></div>' +
      '<div class="form-group"><label>Confirm Password</label>' +
      '<input type="password" id="signup-confirm" placeholder="Repeat password" required autocomplete="new-password">' +
      '<div class="form-error" id="err-confirm"></div></div>' +
      '<button type="submit" class="btn btn-accent form-submit" id="signup-btn">Create account</button>' +
      '</form>' +
      '<p class="auth-link">Already have an account? <a id="go-login">Sign in</a></p>' +
      '</div></div>';

    document.getElementById("go-login").onclick = function() { navigate("#/login"); };

    document.getElementById("signup-form").onsubmit = function(e) {
      e.preventDefault();
      var email = document.getElementById("signup-email").value;
      var pw = document.getElementById("signup-password").value;
      var confirm = document.getElementById("signup-confirm").value;
      var name = document.getElementById("signup-name").value;
      var btn = document.getElementById("signup-btn");
      var alertEl = document.getElementById("signup-alert");

      ["err-email","err-password","err-confirm"].forEach(function(id) {
        document.getElementById(id).textContent = "";
      });
      document.querySelectorAll(".auth-card input").forEach(function(el) { el.classList.remove("error"); });
      alertEl.innerHTML = "";

      var valid = true;
      if (!/\S+@\S+\.\S+/.test(email)) {
        document.getElementById("err-email").textContent = "Enter a valid email address";
        document.getElementById("signup-email").classList.add("error"); valid = false;
      }
      if (pw.length < 8) {
        document.getElementById("err-password").textContent = "Password must be at least 8 characters";
        document.getElementById("signup-password").classList.add("error"); valid = false;
      }
      if (pw !== confirm) {
        document.getElementById("err-confirm").textContent = "Passwords do not match";
        document.getElementById("signup-confirm").classList.add("error"); valid = false;
      }
      if (!valid) return;

      btn.disabled = true; btn.textContent = "Creating account\u2026";
      api("POST", "/v1/auth/signup", {
        email: email, password: pw, display_name: name || null,
      }).then(function(data) {
        token = data.token;
        localStorage.setItem("mg_token", token);
        return api("GET", "/v1/auth/me");
      }).then(function(me) {
        user = me;
        navigate("#/agents");
      }).catch(function(err) {
        alertEl.innerHTML = '<div class="alert alert-error">' + esc(err.detail || "Something went wrong.") + "</div>";
        btn.disabled = false; btn.textContent = "Create account";
      });
    };

    document.querySelectorAll(".auth-card input").forEach(function(inp) {
      inp.addEventListener("input", function() { inp.classList.remove("error"); });
    });
  }

  // ── Agents Dashboard ──
  function renderAgents(app) {
    if (!user) {
      api("GET", "/v1/auth/me").then(function(me) {
        user = me;
        renderAgents(app);
      }).catch(function() { token = null; navigate("#/login"); });
      app.innerHTML = '<div class="loading-page"><span class="spinner"></span> Loading\u2026</div>';
      return;
    }

    var tier = user.subscription_tier || "free";

    app.innerHTML =
      '<div class="dashboard-shell">' +
      renderSidebar("agents") +
      '<div class="main-content">' +
      '<div class="page">' +
      renderBreadcrumb([{label:"MoltGrid",hash:"#/agents"},{label:"Agents"}]) +
      '<div class="dash-header"><div><h1>Your Agents</h1></div>' +
      '<div id="register-area"></div></div>' +
      '<div id="agents-content"><div class="loading-page"><span class="spinner"></span> Loading agents\u2026</div></div>' +
      '</div>' +
      '</div>' +
      '</div>' +
      '<div class="modal-overlay" id="modal-overlay"><div class="modal" id="modal-content"></div></div>';

    wireSidebar();
    document.getElementById("modal-overlay").onclick = function(e) {
      if (e.target.id === "modal-overlay") e.target.classList.remove("active");
    };

    api("GET", "/v1/user/agents").then(function(data) {
      var agents = data.agents || [];
      var content = document.getElementById("agents-content");
      var regArea = document.getElementById("register-area");

      var maxAgents = user.max_agents || 1;
      var atLimit = agents.length >= maxAgents;
      if (atLimit) {
        regArea.innerHTML = '<button class="btn btn-accent" id="upgrade-btn">Upgrade plan \u2192</button>';

          '<div class="agent-stat"><div class="agent-stat-label">Last Seen</div>' +
          '<div class="agent-stat-value">' + esc(timeAgo(a.last_seen)) + '</div></div>' +
          '</div></div>';
      });
      html += '</div>';

    }).catch(function(err) {

  function loadActivity(agentId, filterType, offset, replace) {
    filterType = filterType || "all";
    offset = offset || 0;
    replace = (replace !== false);
    var feed = document.getElementById("activity-feed");
    if (!feed) return;
    if (replace) feed.innerHTML = '<div class="loading-page" style="min-height:6vh"><span class="spinner"></span></div>';
    var qs = "?limit=20&offset=" + offset + "&type=" + encodeURIComponent(filterType);
    api("GET", "/v1/user/agents/" + agentId + "/activity" + qs).then(function(data) {
      feed = document.getElementById("activity-feed");
      if (!feed) return;
      var events = data.events || [];
      var total = data.total || 0;
      var nextOffset = offset + events.length;
      if (replace) {
        if (events.length === 0) {
          feed.innerHTML = '<div class="activity-list"><div class="activity-item"><div class="activity-text dim">No activity yet</div></div></div>';
          return;
        }
        feed.innerHTML = '<div class="activity-list" id="activity-list"></div>';
      } else {
        if (!document.getElementById("activity-list")) {
          feed.innerHTML = '<div class="activity-list" id="activity-list"></div>';
        }
        var oldLm = document.getElementById("lm-btn");
        if (oldLm) oldLm.remove();
      }
      var list = document.getElementById("activity-list");
      events.forEach(function(ev) {
        var icon = "&#128203;";
        var text = "";
        var clickType = null;
        var clickId = null;
        var t = ev.event_type || "";
        if (t === "message_received") {
          icon = "&#128232;"; text = "Message received from <span class=\"dim\">" + esc(ev.source || "unknown") + "</span>";
          clickType = "message"; clickId = ev.message_id;
        } else if (t === "message_sent") {
          icon = "&#128228;"; text = "Message sent to <span class=\"dim\">" + esc(ev.target || "unknown") + "</span>";
          clickType = "message"; clickId = ev.message_id;
        } else if (t.indexOf("job_completed") === 0) {
          icon = "&#9989;"; text = "Job <span class=\"dim\">" + esc(ev.job_id || "") + "</span> completed";
          clickType = "job"; clickId = ev.job_id;
        } else if (t.indexOf("job_failed") === 0) {
          icon = "&#10060;"; text = "Job <span class=\"dim\">" + esc(ev.job_id || "") + "</span> failed";
          clickType = "job"; clickId = ev.job_id;
        } else if (t.indexOf("job_pending") === 0) {
          icon = "&#128230;"; text = "Job <span class=\"dim\">" + esc(ev.job_id || "") + "</span> submitted";
          clickType = "job"; clickId = ev.job_id;
        } else if (t.indexOf("job_") === 0) {
          icon = "&#9203;"; text = "Job <span class=\"dim\">" + esc(ev.job_id || "") + "</span> " + esc(t.replace("job_", ""));
          clickType = "job"; clickId = ev.job_id;
        } else if (t === "memory_update") {
          icon = "&#128190;"; text = "Memory key <span class=\"dim\">\"" + esc(ev.key || "") + "\"</span> updated";
          clickType = "memory";
        } else if (t === "schedule") {
          icon = "&#9200;"; text = "Schedule <span class=\"dim\">" + esc(ev.task_id || "") + "</span>";
        } else if (t === "key_rotated") {
          icon = "&#128273;"; text = "API key regenerated";
        } else {
          text = esc(t);
        }
        var div = document.createElement("div");
        div.className = "activity-item" + (clickType ? " clickable" : "");
        div.innerHTML =
          '<div class="activity-icon">' + icon + '</div>' +
          '<div class="activity-text">' + text + '</div>' +
          '<div class="activity-time">' + esc(timeAgo(ev.timestamp)) + '</div>';
        if (clickType === "message" && clickId) {
          (function(mid) { div.onclick = function() { showActivityDetail(agentId, "message", mid); }; })(clickId);
        } else if (clickType === "job" && clickId) {
          (function(jid) { div.onclick = function() { showActivityDetail(agentId, "job", jid); }; })(clickId);
        } else if (clickType === "memory") {
          (function(ns, k) { div.onclick = function() { showActivityDetail(agentId, "memory", null, ns, k); }; })(ev.namespace || "default", ev.key || "");
        }
        list.appendChild(div);
      });
      if (nextOffset < total) {
        var lm = document.createElement("button");
        lm.className = "load-more-btn";
        lm.id = "lm-btn";
        lm.textContent = "Load more (" + (total - nextOffset) + " remaining)";
        lm.onclick = function() {
          lm.disabled = true; lm.textContent = "Loading\u2026";
          loadActivity(agentId, filterType, nextOffset, false);
        };
        feed.appendChild(lm);
      }
    }).catch(function() {});
  }

  var _chartInstances = {};
  function loadCharts(agentId, days) {
    api("GET", "/v1/user/agents/" + agentId + "/charts?days=" + days).then(function(data) {
      // Destroy previous instances
      ["messages", "jobs"].forEach(function(k) {
        if (_chartInstances[k]) { _chartInstances[k].destroy(); delete _chartInstances[k]; }
      });
      var labels = data.messages.map(function(m) { return m.date.slice(5); });

      var msgCtx = document.getElementById("chart-messages");
      if (msgCtx) {
        _chartInstances.messages = new Chart(msgCtx, {
          type: "bar",
          data: {
            labels: labels,
            datasets: [
              { label: "Sent", data: data.messages.map(function(m) { return m.sent; }), backgroundColor: "rgba(180,100,255,0.75)", borderRadius: 2 },
              { label: "Received", data: data.messages.map(function(m) { return m.received; }), backgroundColor: "rgba(100,180,255,0.75)", borderRadius: 2 },
            ],
          },
          options: _chartOpts(true),
        });
      }

      var jobCtx = document.getElementById("chart-jobs");
      if (jobCtx) {
        _chartInstances.jobs = new Chart(jobCtx, {
          type: "bar",
          data: {
            labels: labels,
            datasets: [
              { label: "Completed", data: data.jobs.map(function(j) { return j.completed; }), backgroundColor: "rgba(0,220,100,0.75)", borderRadius: 2 },
              { label: "Failed", data: data.jobs.map(function(j) { return j.failed; }), backgroundColor: "rgba(255,51,51,0.75)", borderRadius: 2 },
              { label: "Pending", data: data.jobs.map(function(j) { return j.pending; }), backgroundColor: "rgba(255,200,0,0.5)", borderRadius: 2 },
            ],
          },
          options: _chartOpts(true),
        });
      }
    }).catch(function() {});
  }

  function _chartOpts(stacked) {
    return {
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 300 },
      plugins: {
        legend: { labels: { color: "#888", font: { family: "JetBrains Mono, monospace", size: 10 }, boxWidth: 10, padding: 10 } },
      },
      scales: {
        x: { stacked: stacked, ticks: { color: "#555", font: { size: 9 }, maxRotation: 0 }, grid: { color: "rgba(255,255,255,0.04)" } },
        y: { stacked: stacked, ticks: { color: "#555", precision: 0, font: { size: 9 } }, grid: { color: "rgba(255,255,255,0.06)" }, beginAtZero: true },
      },
    };
  }

  function renderTabMessages(agentId) {
    var tc = document.getElementById("tab-content");
    if (!tc) return;
    var _dir = "all", _search = "", _offset = 0, _total = 0;
    function load(offset, replace) {
      offset = offset || 0;
      var qs = "?limit=20&offset=" + offset + "&direction=" + encodeURIComponent(_dir) + (_search ? "&search=" + encodeURIComponent(_search) : "");
      api("GET", "/v1/user/agents/" + agentId + "/messages-list" + qs).then(function(data) {
        _total = data.total || 0;
        _offset = offset + (data.messages || []).length;
        var tbody = document.getElementById("msg-tbody");
        if (!tbody) return;
        if (replace) tbody.innerHTML = "";
        if ((data.messages || []).length === 0 && replace) {
          tbody.innerHTML = '<tr><td colspan="5" class="tab-empty">No messages found</td></tr>';
        } else {
          (data.messages || []).forEach(function(m) {
            var tr = document.createElement("tr");
            tr.className = "clickable";
            tr.innerHTML =
              '<td style="font-family:monospace;font-size:0.75rem">' + esc(m.message_id.slice(0,16)) + '\u2026</td>' +
              '<td>' + esc(m.from_name || m.from_agent) + '</td>' +
              '<td>' + esc(m.to_name || m.to_agent) + '</td>' +
              '<td><span class="status-pill">' + esc(m.channel) + '</span></td>' +
              '<td style="color:var(--text-dim);font-size:0.75rem">' + esc(timeAgo(m.created_at)) + '</td>';
            tr.onclick = function() { showActivityDetail(agentId, "message", m.message_id); };
            tbody.appendChild(tr);
          });
        }
        var pg = document.getElementById("msg-pagination");
        if (pg) {
          pg.innerHTML = _offset < _total ? '<button class="load-more-btn" id="msg-load-more">Load more (' + (_total - _offset) + ' remaining)</button>' : "";
          var lm = document.getElementById("msg-load-more");
          if (lm) lm.onclick = function() { load(_offset, false); };
        }
      }).catch(function(e) {
        var tbody = document.getElementById("msg-tbody");
        if (tbody) tbody.innerHTML = '<tr><td colspan="5" class="tab-empty">' + esc(e.detail || "Error loading") + '</td></tr>';
      });
    }
    tc.innerHTML =
      '<div class="tab-toolbar">' +
      '<select id="msg-dir-filter" style="background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:6px 10px;font-size:0.8rem;cursor:pointer">' +
      '<option value="all">All Messages</option><option value="sent">Sent</option><option value="received">Received</option>' +
      '</select>' +
      '<input id="msg-search" class="tab-search" type="text" placeholder="Search\u2026">' +
      '<button class="btn btn-sm" id="msg-refresh" style="margin-left:auto">&#8635; Refresh</button>' +
      '</div>' +
      '<table class="data-table"><thead><tr><th>Message ID</th><th>From</th><th>To</th><th>Channel</th><th>Time</th></tr></thead>' +
      '<tbody id="msg-tbody"><tr><td colspan="5" class="tab-empty"><span class="spinner"></span></td></tr></tbody></table>' +
      '<div id="msg-pagination"></div>';
    load(0, true);
    document.getElementById("msg-dir-filter").onchange = function() { _dir = this.value; load(0, true); };
    var _msgST;
    document.getElementById("msg-search").oninput = function() {
      clearTimeout(_msgST); var val = this.value;
      _msgST = setTimeout(function() { _search = val; load(0, true); }, 400);

  function renderTabMemory(agentId) {
    var tc = document.getElementById("tab-content");
    if (!tc) return;
    var _ns = "", _search = "", _vis = "", _offset = 0, _total = 0;
    var _selected = {};  // {ns+"|"+key: {namespace, key}}

    function visBadge(v) {
      v = v || "private";
      return '<span class="vis-badge ' + esc(v) + '">' + esc(v) + '</span>';
    }

    function updateBulkBtn() {
      var n = Object.keys(_selected).length;
      var btn = document.getElementById("mem-bulk-btn");
      if (btn) { btn.disabled = n === 0; btn.textContent = "Change Visibility" + (n ? " (" + n + ")" : ""); }
    }

    function load(offset, replace) {
      offset = offset || 0;
      var qs = "?limit=30&offset=" + offset +
        (_ns ? "&namespace=" + encodeURIComponent(_ns) : "") +
        (_search ? "&search=" + encodeURIComponent(_search) : "") +
        (_vis ? "&visibility=" + encodeURIComponent(_vis) : "");
      api("GET", "/v1/user/agents/" + agentId + "/memory-list" + qs).then(function(data) {
        _total = data.total || 0;
        _offset = offset + (data.keys || []).length;
        var nsSel = document.getElementById("mem-ns-filter");
        if (nsSel && replace) {
          var cur = nsSel.value;
          nsSel.innerHTML = '<option value="">All Namespaces</option>';
          (data.namespaces || []).forEach(function(n) {
            var opt = document.createElement("option");
            opt.value = n; opt.textContent = n;
            if (n === cur) opt.selected = true;
            nsSel.appendChild(opt);
          });
        }
        var tbody = document.getElementById("mem-tbody");
        if (!tbody) return;
        if (replace) { tbody.innerHTML = ""; _selected = {}; updateBulkBtn(); }
        if ((data.keys || []).length === 0 && replace) {
          tbody.innerHTML = '<tr><td colspan="7" class="tab-empty">No memory keys found</td></tr>';
        } else {
          (data.keys || []).forEach(function(m) {
            var rowKey = m.namespace + "|" + m.key;
            var tr = document.createElement("tr");
            tr.className = "clickable";
            tr.innerHTML =
              '<td><input type="checkbox" class="mem-checkbox mem-row-cb" data-ns="' + esc(m.namespace) + '" data-key="' + esc(m.key) + '"' + (_selected[rowKey] ? ' checked' : '') + '></td>' +
              '<td style="font-family:monospace;font-size:0.8rem">' + esc(m.namespace) + '</td>' +
              '<td style="font-family:monospace;font-size:0.8rem">' + esc(m.key) + '</td>' +
              '<td>' + visBadge(m.visibility) + '</td>' +
              '<td style="color:var(--text-dim);font-size:0.75rem">' + esc(timeAgo(m.updated_at)) + '</td>' +
              '<td style="color:var(--text-dim);font-size:0.75rem">' + (m.expires_at ? esc(timeAgo(m.expires_at)) : "never") + '</td>' +
              '<td><button class="btn btn-sm btn-danger mem-del-btn" data-ns="' + esc(m.namespace) + '" data-key="' + esc(m.key) + '" style="font-size:0.7rem;padding:3px 8px">Delete</button></td>';
            tr.onclick = function(e) {
              if (e.target.classList.contains("mem-del-btn") || e.target.classList.contains("mem-row-cb")) return;
              showMemoryDetailModal(agentId, m.namespace, m.key, load);
            };
            tbody.appendChild(tr);
          });
          tbody.querySelectorAll(".mem-row-cb").forEach(function(cb) {
            cb.onchange = function() {
              var rk = this.getAttribute("data-ns") + "|" + this.getAttribute("data-key");
              if (this.checked) _selected[rk] = {namespace: this.getAttribute("data-ns"), key: this.getAttribute("data-key")};
              else delete _selected[rk];
              updateBulkBtn();
              var selAll = document.getElementById("mem-select-all");
              if (selAll) {
                var all = tbody.querySelectorAll(".mem-row-cb");
                selAll.checked = all.length > 0 && Array.from(all).every(function(x) { return x.checked; });
              }
            };
          });
          tbody.querySelectorAll(".mem-del-btn").forEach(function(btn) {
            btn.onclick = function(e) {
              e.stopPropagation();
              var ns = this.getAttribute("data-ns"), key = this.getAttribute("data-key");
              if (!confirm("Delete memory key '" + ns + "/" + key + "'?")) return;
              api("DELETE", "/v1/user/agents/" + agentId + "/memory-entry?namespace=" + encodeURIComponent(ns) + "&key=" + encodeURIComponent(key))
                .then(function() { showToast("Memory key deleted", "success"); load(0, true); })
                .catch(function(e) { showToast(e.detail || "Delete failed", "error"); });
            };
          });
        }
        var pg = document.getElementById("mem-pagination");
        if (pg) {
          pg.innerHTML = _offset < _total ? '<button class="load-more-btn" id="mem-load-more">Load more (' + (_total - _offset) + ' remaining)</button>' : "";
          var lm = document.getElementById("mem-load-more");
          if (lm) lm.onclick = function() { load(_offset, false); };
        }
      }).catch(function(e) {
        var tbody = document.getElementById("mem-tbody");
        if (tbody) tbody.innerHTML = '<tr><td colspan="7" class="tab-empty">' + esc(e.detail || "Error loading") + '</td></tr>';
      });
    }

    var selStyle = "background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:6px 10px;font-size:0.8rem;cursor:pointer";
    tc.innerHTML =
      '<div class="tab-toolbar">' +
      '<select id="mem-ns-filter" style="' + selStyle + '"><option value="">All Namespaces</option></select>' +
      '<select id="mem-vis-filter" style="' + selStyle + '">' +
      '<option value="">All Visibility</option>' +
      '<option value="private">Private</option>' +
      '<option value="public">Public</option>' +
      '<option value="shared">Shared</option>' +
      '</select>' +
      '<input id="mem-search" class="tab-search" type="text" placeholder="Search keys\u2026">' +
      '<button class="btn btn-sm" id="mem-refresh" style="margin-left:auto">&#8635; Refresh</button>' +
      '</div>' +
      '<div class="bulk-action-bar">' +
      '<button class="btn btn-sm" id="mem-bulk-btn" disabled>Change Visibility</button>' +
      '<span id="mem-sel-count" style="font-size:0.75rem;color:var(--text-dim)"></span>' +
      '</div>' +
      '<table class="data-table"><thead><tr>' +
      '<th style="width:24px"><input type="checkbox" class="mem-checkbox" id="mem-select-all"></th>' +
      '<th>Namespace</th><th>Key</th><th>Visibility</th><th>Updated</th><th>Expires</th><th></th>' +
      '</tr></thead>' +
      '<tbody id="mem-tbody"><tr><td colspan="7" class="tab-empty"><span class="spinner"></span></td></tr></tbody></table>' +
      '<div id="mem-pagination"></div>';

    load(0, true);

    document.getElementById("mem-ns-filter").onchange = function() { _ns = this.value; load(0, true); };
    document.getElementById("mem-vis-filter").onchange = function() { _vis = this.value; load(0, true); };
    var _memST;
    document.getElementById("mem-search").oninput = function() {
      clearTimeout(_memST); var val = this.value;
      _memST = setTimeout(function() { _search = val; load(0, true); }, 400);
    };
    document.getElementById("mem-refresh").onclick = function() { load(0, true); };
    document.getElementById("mem-select-all").onchange = function() {
      var checked = this.checked;
      document.querySelectorAll("#mem-tbody .mem-row-cb").forEach(function(cb) {
        cb.checked = checked;
        var rk = cb.getAttribute("data-ns") + "|" + cb.getAttribute("data-key");
        if (checked) _selected[rk] = {namespace: cb.getAttribute("data-ns"), key: cb.getAttribute("data-key")};
        else delete _selected[rk];
      });
      updateBulkBtn();
    };
    document.getElementById("mem-bulk-btn").onclick = function() {
      var entries = Object.values(_selected);
      if (entries.length === 0) return;
      showBulkVisibilityModal(agentId, entries, function() { load(0, true); });
    };
  }

      api("GET", "/v1/user/agents/" + agentId + "/webhooks").then(function(data) {
        var wlist = document.getElementById("webhook-list");
        if (!wlist) return;
        var whs = data.webhooks || [];
        if (whs.length === 0) {
          wlist.innerHTML = '<div style="color:var(--text-dim);font-size:0.82rem;padding:0.5rem 0">No webhooks registered.</div>';
        } else {
          wlist.innerHTML = whs.map(function(w) {
            return '<div style="display:flex;align-items:center;gap:0.75rem;padding:6px 0;border-bottom:1px solid var(--border)">' +
              '<div style="flex:1;min-width:0;font-size:0.8rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="' + esc(w.url) + '">' + esc(w.url) + '</div>' +

              '<button class="btn btn-sm btn-danger wh-del-btn" data-wh-id="' + esc(w.webhook_id) + '" style="font-size:0.7rem;padding:3px 8px">Delete</button>' +
              '</div>';
          }).join("");

            btn.onclick = function() {
              var wid = this.getAttribute("data-wh-id");
              if (!confirm("Delete this webhook?")) return;
              api("DELETE", "/v1/user/agents/" + agentId + "/webhooks/" + wid)
                .then(function() { showToast("Webhook deleted", "success"); loadWebhooks(); })
                .catch(function(e) { showToast(e.detail || "Delete failed", "error"); });
            };
          });
        }

      '<div class="settings-section">' +

      '<div style="display:flex;gap:0.5rem;align-items:center">' +
      '<input class="input" id="set-name-input" value="' + esc(stats.name || "") + '" style="flex:1" maxlength="64">' +

      '<div class="settings-section">' +
      '<div class="section-title" style="margin:0 0 0.5rem">API Key</div>' +
      '<div style="color:var(--text-dim);font-size:0.82rem;margin-bottom:0.75rem">Regenerating creates a new key and immediately invalidates the old one.</div>' +
      '<button class="btn btn-sm" id="set-regen-btn">&#128273; Regenerate API Key</button>' +
      '</div>' +
      '<div class="settings-section">' +
      '<div class="section-title" style="margin:0 0 0.75rem">Webhooks</div>' +
      '<div id="webhook-list"><span class="spinner"></span></div>' +
      '<div style="margin-top:0.75rem"><button class="btn btn-sm" id="set-add-webhook-btn">+ Add Webhook</button></div>' +
      '</div>' +
      '<div class="settings-section" style="border-color:var(--accent)">' +
      '<div class="section-title" style="margin:0 0 0.5rem;color:var(--accent)">Danger Zone</div>' +
      '<div style="color:var(--text-dim);font-size:0.82rem;margin-bottom:0.75rem">Permanently deletes this agent, all its memory, jobs, and schedules. This cannot be undone.</div>' +
      '<button class="btn btn-accent btn-sm" id="set-delete-btn">Delete Agent</button>' +
      '</div>';

      var errEl = document.getElementById("set-name-err");
      if (!newName) { errEl.textContent = "Name cannot be empty"; return; }
      api("PATCH", "/v1/user/agents/" + agentId, { name: newName })
        .then(function() { showToast("Agent renamed", "success"); stats.name = newName; errEl.textContent = ""; })
        .catch(function(e) { errEl.textContent = e.detail || "Failed to rename"; });

  function showActivityDetail(agentId, type, id, ns, key) {
    var overlay = document.getElementById("modal-overlay");
    var mc = document.getElementById("modal-content");
    overlay.classList.add("active");
    mc.innerHTML = '<div style="text-align:center;padding:2rem"><span class="spinner"></span></div>';
    var p;
    if (type === "message") {
      p = api("GET", "/v1/user/agents/" + agentId + "/messages/" + id);
    } else if (type === "job") {
      p = api("GET", "/v1/user/agents/" + agentId + "/jobs/" + id);
    } else if (type === "memory") {
      p = api("GET", "/v1/user/agents/" + agentId + "/memory-entry?namespace=" + encodeURIComponent(ns || "default") + "&key=" + encodeURIComponent(key || ""));
    } else {
      overlay.classList.remove("active"); return;
    }
    p.then(function(d) {
      var html = '<h2 style="margin-bottom:1rem">';
      if (type === "message") {
        html += (d.from_agent === agentId ? "&#128228; Message Sent" : "&#128232; Message Received") + "</h2>";
        html += '<div class="detail-row"><div class="detail-field"><label>From</label><div class="detail-value">' + esc(d.from_name || d.from_agent) + '</div></div>';
        html += '<div class="detail-field"><label>To</label><div class="detail-value">' + esc(d.to_name || d.to_agent) + '</div></div></div>';
        html += '<div class="detail-field"><label>Channel</label><div class="detail-value">' + esc(d.channel || "default") + '</div></div>';
        html += '<div class="detail-field"><label>Time</label><div class="detail-value">' + esc(d.created_at || "") + '</div></div>';
        html += '<div class="detail-field"><label>Payload</label><div class="detail-value">' + esc(formatJson(d.payload)) + '</div></div>';
      } else if (type === "job") {
        var sc = (d.status || "").toLowerCase();
        html += "&#128230; Job Detail</h2>";
        html += '<div class="detail-row"><div class="detail-field"><label>Queue</label><div class="detail-value">' + esc(d.queue_name || "") + '</div></div>';
        html += '<div class="detail-field"><label>Status</label><div class="detail-value"><span class="status-pill ' + esc(sc) + '">' + esc(d.status || "") + '</span></div></div></div>';
        html += '<div class="detail-row"><div class="detail-field"><label>Created</label><div class="detail-value">' + esc(d.created_at || "") + '</div></div>';
        html += '<div class="detail-field"><label>Completed</label><div class="detail-value">' + esc(d.completed_at || d.failed_at || "\u2014") + '</div></div></div>';
        html += '<div class="detail-field"><label>Payload</label><div class="detail-value">' + esc(formatJson(d.payload)) + '</div></div>';
        if (d.result) html += '<div class="detail-field"><label>Result</label><div class="detail-value">' + esc(formatJson(d.result)) + '</div></div>';
        if (d.error) html += '<div class="detail-field"><label>Error</label><div class="detail-value" style="color:var(--accent)">' + esc(d.error) + '</div></div>';
      } else if (type === "memory") {
        html += "&#128190; Memory Entry</h2>";
        html += '<div class="detail-row"><div class="detail-field"><label>Namespace</label><div class="detail-value">' + esc(d.namespace || "") + '</div></div>';
        html += '<div class="detail-field"><label>Key</label><div class="detail-value">' + esc(d.key || "") + '</div></div></div>';
        html += '<div class="detail-field"><label>Updated</label><div class="detail-value">' + esc(d.updated_at || "") + '</div></div>';
        html += '<div class="detail-field"><label>Value</label><div class="detail-value">' + esc(formatJson(d.value)) + '</div></div>';
      }
      html += '<button class="btn btn-ghost" style="margin-top:1rem;width:100%" id="detail-close">Close</button>';
      mc.innerHTML = html;
      document.getElementById("detail-close").onclick = function() { overlay.classList.remove("active"); };
    }).catch(function(err) {
      mc.innerHTML = '<h2>Error</h2><p class="subtitle" style="color:var(--accent)">' + esc(err.detail || "Failed to load details") + '</p><div class="modal-actions"><button class="btn btn-ghost" id="detail-close">Close</button></div>';
      document.getElementById("detail-close").onclick = function() { overlay.classList.remove("active"); };
    });
  }

  function formatJson(val) {
    if (!val) return "";
    if (typeof val === "object") { try { return JSON.stringify(val, null, 2); } catch(e) { return String(val); } }
    try { return JSON.stringify(JSON.parse(val), null, 2); } catch(e) { return String(val); }
  }

  function showToast(message, type) {
    type = type || "info";
    var el = document.createElement("div");
    el.className = "toast " + type;
    el.textContent = message;
    document.body.appendChild(el);
    requestAnimationFrame(function() {
      requestAnimationFrame(function() { el.classList.add("show"); });
    });
    setTimeout(function() {
      el.classList.remove("show");
      setTimeout(function() { if (el.parentNode) el.parentNode.removeChild(el); }, 300);
    }, 3000);
  }

  function buildAgentPicker(wrapEl, agents, defaultId) {
    var selected = null;
    for (var i = 0; i < agents.length; i++) {
      if (agents[i].agent_id === defaultId) { selected = agents[i]; break; }
    }
    if (!selected && agents.length) selected = agents[0];

    function label(a) { return a ? (a.name || a.agent_id) : "Select agent\u2026"; }

    wrapEl.innerHTML =
      '<div class="agent-picker-input" tabindex="0">' +
      '<span class="ap-name">' + esc(label(selected)) + '</span>' +
      (selected ? '<span class="ap-id-inline">' + esc(selected.agent_id) + '</span>' : '') +
      '<span class="chevron">&#9660;</span>' +
      '</div>' +
      '<div class="agent-picker-list">' +
      '<input class="agent-picker-search" placeholder="Search\u2026" autocomplete="off">' +
      '<div class="agent-picker-items"></div>' +
      '</div>';

    var displayBtn = wrapEl.querySelector(".agent-picker-input");
    var listEl = wrapEl.querySelector(".agent-picker-list");
    var searchEl = wrapEl.querySelector(".agent-picker-search");
    var itemsEl = wrapEl.querySelector(".agent-picker-items");

    function renderItems(filter) {
      var q = (filter || "").toLowerCase();
      var filtered = agents.filter(function(a) {
        return !q || (a.name || "").toLowerCase().indexOf(q) !== -1 || a.agent_id.toLowerCase().indexOf(q) !== -1;
      });
      if (!filtered.length) {
        itemsEl.innerHTML = '<div class="agent-picker-empty">No agents found</div>';
        return;
      }
      itemsEl.innerHTML = "";
      filtered.forEach(function(a) {
        var div = document.createElement("div");
        div.className = "agent-picker-item";
        div.innerHTML = '<div class="ap-name">' + esc(a.name || a.agent_id) + '</div><div class="ap-id">' + esc(a.agent_id) + '</div>';
        div.onclick = function() {
          selected = a;
          displayBtn.querySelector(".ap-name").textContent = label(a);
          var idSpan = displayBtn.querySelector(".ap-id-inline");
          if (idSpan) idSpan.textContent = a.agent_id;
          else displayBtn.insertBefore(Object.assign(document.createElement("span"), { className:"ap-id-inline", textContent:a.agent_id }), displayBtn.querySelector(".chevron"));
          listEl.classList.remove("open");
          displayBtn.classList.remove("open");
        };
        itemsEl.appendChild(div);
      });
    }
    renderItems("");

    displayBtn.onclick = function(e) {
      e.stopPropagation();
      var opening = !listEl.classList.contains("open");
      listEl.classList.toggle("open");
      displayBtn.classList.toggle("open");
      if (opening) { searchEl.value = ""; renderItems(""); searchEl.focus(); }
    };
    searchEl.oninput = function() { renderItems(this.value); };
    searchEl.onclick = function(e) { e.stopPropagation(); };

    document.addEventListener("click", function _close(e) {
      if (!wrapEl.contains(e.target)) {
        listEl.classList.remove("open");
        displayBtn.classList.remove("open");
        document.removeEventListener("click", _close);
      }
    });

    wrapEl._getSelected = function() { return selected ? selected.agent_id : null; };
    wrapEl._getAgent = function() { return selected; };
  }

  function showMessageModal(fromAgentId) {
    var overlay = document.getElementById("modal-overlay");
    var mc = document.getElementById("modal-content");
    overlay.classList.add("active");
    mc.innerHTML =
      '<h2>Send Test Message</h2>' +
      '<div class="loading-page" style="min-height:6vh"><span class="spinner"></span></div>';

    api("GET", "/v1/user/agents").then(function(data) {
      var agents = data.agents || [];
      mc.innerHTML =
        '<h2>Send Test Message</h2>' +
        '<div class="form-group"><label>From Agent</label>' +
        '<div class="agent-picker" id="msg-from-picker"></div></div>' +
        '<div class="form-group"><label>To Agent</label>' +
        '<div class="agent-picker" id="msg-to-picker"></div></div>' +
        '<div class="form-group"><label>Channel</label>' +
        '<input type="text" id="msg-channel" value="direct" maxlength="64" autocomplete="off"></div>' +
        '<div class="form-group"><label>Payload</label>' +
        '<textarea id="msg-payload" placeholder=\'{"hello": "world"}\'></textarea></div>' +
        '<div id="msg-err" style="min-height:1em;font-size:0.8rem;color:var(--accent);margin-bottom:0.5rem"></div>' +
        '<div class="modal-actions">' +
        '<button class="btn btn-ghost" id="msg-cancel">Cancel</button>' +
        '<button class="btn btn-accent" id="msg-send">Send &#128228;</button></div>';

      buildAgentPicker(document.getElementById("msg-from-picker"), agents, fromAgentId);
      var defaultTo = fromAgentId;
      for (var i = 0; i < agents.length; i++) {
        if (agents[i].agent_id !== fromAgentId) { defaultTo = agents[i].agent_id; break; }
      }
      buildAgentPicker(document.getElementById("msg-to-picker"), agents, defaultTo);

      document.getElementById("msg-cancel").onclick = function() { overlay.classList.remove("active"); };

      document.getElementById("msg-send").onclick = function() {
        var fromPicker = document.getElementById("msg-from-picker");
        var toPicker = document.getElementById("msg-to-picker");
        var fromId = fromPicker._getSelected();
        var toId = toPicker._getSelected();
        var toAgent = toPicker._getAgent();
        var channel = document.getElementById("msg-channel").value.trim() || "direct";
        var payload = document.getElementById("msg-payload").value.trim() || "{}";
        var errEl = document.getElementById("msg-err");
        errEl.textContent = "";
        if (!fromId) { errEl.textContent = "Select a sender agent."; return; }
        if (!toId) { errEl.textContent = "Select a recipient agent."; return; }
        var btn = this;
        btn.disabled = true; btn.innerHTML = "Sending\u2026";
        api("POST", "/v1/user/agents/" + fromId + "/send", {
          to_agent: toId, channel: channel, payload: payload,
        }).then(function(resp) {
          overlay.classList.remove("active");
          showToast("Message sent successfully!", "success");
          // Prepend to activity feed immediately
          var list = document.getElementById("activity-list");
          if (list) {
            var toLabel = toAgent ? (toAgent.name || toId) : toId;
            var div = document.createElement("div");
            div.className = "activity-item clickable";
            div.innerHTML =
              '<div class="activity-icon">&#128228;</div>' +
              '<div class="activity-text">Message sent to <span class="dim">' + esc(toLabel) + '</span></div>' +
              '<div class="activity-time">just now</div>';
            var mid = resp.message_id;
            var aid = fromId;
            div.onclick = function() { showActivityDetail(aid, "message", mid); };
            list.insertBefore(div, list.firstChild);
          }
        }).catch(function(err) {
          errEl.textContent = err.detail || "Failed to send message.";
          btn.disabled = false; btn.innerHTML = "Send &#128228;";
          showToast(err.detail || "Send failed", "error");
        });
      };
    }).catch(function(err) {
      mc.innerHTML =
        '<h2>Send Test Message</h2>' +
        '<p class="subtitle" style="color:var(--accent)">' + esc(err.detail || "Failed to load agents") + '</p>' +
        '<div class="modal-actions"><button class="btn btn-ghost" id="msg-cancel">Close</button></div>';
      document.getElementById("msg-cancel").onclick = function() { overlay.classList.remove("active"); };
    });
  }
