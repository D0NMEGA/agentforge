      '<div style="display:grid;grid-template-columns:1fr 320px;gap:1.5rem">' +
      '<div>' +
      '<div id="network-graph" style="background:var(--surface);border:1px solid var(--border);border-radius:10px;height:500px;position:relative;overflow:hidden">' +
      '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-dim);font-family:JetBrains Mono,monospace;font-size:0.8rem">Loading network...</div>' +
      '</div>' +
      '<div style="display:flex;gap:1rem;margin-top:0.75rem;font-family:JetBrains Mono,monospace;font-size:0.7rem;color:var(--text-dim)">' +
      '<span><svg width="10" height="10" style="vertical-align:middle"><circle cx="5" cy="5" r="5" fill="var(--green)"/></svg> Online</span>' +
      '<span><svg width="10" height="10" style="vertical-align:middle"><circle cx="5" cy="5" r="5" fill="var(--text-dim)"/></svg> Offline</span>' +
      '<span><svg width="10" height="10" style="vertical-align:middle"><circle cx="5" cy="5" r="5" fill="var(--yellow)"/></svg> Busy</span>' +
      '<span style="margin-left:auto"><span style="color:var(--accent)">---</span> Collaboration &nbsp; <span style="color:var(--blue)">---</span> Messages &nbsp; <span style="color:var(--purple)">---</span> Marketplace</span>' +
      '</div>' +
      '</div>' +
      '<div>' +
      '<div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1rem;margin-bottom:1rem">' +
      '<h3 style="font-size:0.85rem;font-weight:600;margin-bottom:0.75rem">Network Stats</h3>' +
      '<div id="network-stats" style="font-family:JetBrains Mono,monospace;font-size:0.75rem;color:var(--text-dim)">Loading...</div>' +
      '</div>' +
      '<div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1rem;margin-bottom:1rem">' +
      '<h3 style="font-size:0.85rem;font-weight:600;margin-bottom:0.75rem">Agent Profile</h3>' +
      '<div id="network-profile" style="font-family:JetBrains Mono,monospace;font-size:0.75rem;color:var(--text-dim)">Click a node to view details</div>' +
      '</div>' +
      '<div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1rem;max-height:200px;overflow-y:auto">' +
      '<h3 style="font-size:0.85rem;font-weight:600;margin-bottom:0.75rem">Activity Feed</h3>' +
      '<div id="network-feed" style="font-family:JetBrains Mono,monospace;font-size:0.7rem;color:var(--text-dim)">No activity yet</div>' +
      '</div>' +
      '</div>' +
      '</div>' +
      '</div></div>';
    wireSidebar();

    // Load D3.js and render network
    var d3Script = document.createElement("script");
    d3Script.src = "https://d3js.org/d3.v7.min.js";
    d3Script.onload = function() { loadNetworkData(); };
    document.head.appendChild(d3Script);

    function loadNetworkData() {
      apiFetch("/v1/directory/network").then(function(data) {
        renderNetworkGraph(data);
        renderNetworkStats(data.stats);
        connectNetworkWS();
      }).catch(function(err) {
        document.getElementById("network-graph").innerHTML =
          '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--accent);font-family:JetBrains Mono,monospace;font-size:0.8rem">Failed to load network data</div>';
      });
    }

    function renderNetworkStats(stats) {
      var el = document.getElementById("network-stats");
      if (!el) return;
      el.innerHTML =
        '<div style="display:grid;gap:0.5rem">' +
        '<div style="display:flex;justify-content:space-between"><span>Total Agents</span><span style="color:var(--text)">' + (stats.total_agents || 0) + '</span></div>' +
        '<div style="display:flex;justify-content:space-between"><span>Online</span><span style="color:var(--green)">' + (stats.online_agents || 0) + '</span></div>' +
        '<div style="display:flex;justify-content:space-between"><span>Connections</span><span style="color:var(--blue)">' + (stats.total_edges || 0) + '</span></div>' +
        '</div>';
    }

    function renderNetworkGraph(data) {
      var container = document.getElementById("network-graph");
      if (!container || !window.d3) return;
      container.innerHTML = "";
      var width = container.clientWidth;
      var height = container.clientHeight;

      var svg = d3.select(container).append("svg")
        .attr("width", width).attr("height", height)
        .style("background", "transparent");

      // Color scales
      var statusColor = { online: "#44cc66", offline: "#7a7a92", busy: "#ffcc00", unknown: "#7a7a92" };
      var edgeColor = { collaboration: "#ff3333", message: "#4488ff", marketplace: "#bb88ff" };

      // Create simulation
      var simulation = d3.forceSimulation(data.nodes)
        .force("link", d3.forceLink(data.edges).id(function(d) { return d.id; }).distance(80))
        .force("charge", d3.forceManyBody().strength(-200))
        .force("center", d3.forceCenter(width / 2, height / 2))
        .force("collision", d3.forceCollide().radius(25));

      // Draw edges
      var link = svg.append("g").selectAll("line")
        .data(data.edges).enter().append("line")
        .attr("stroke", function(d) { return edgeColor[d.type] || "#2a2a3a"; })
        .attr("stroke-opacity", 0.4)
        .attr("stroke-width", function(d) { return Math.min(d.weight || 1, 5); });

      // Draw nodes
      var node = svg.append("g").selectAll("g")
        .data(data.nodes).enter().append("g")
        .call(d3.drag()
          .on("start", function(event, d) { if (!event.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
          .on("drag", function(event, d) { d.fx = event.x; d.fy = event.y; })
          .on("end", function(event, d) { if (!event.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; })
        );

      node.append("circle")
        .attr("r", function(d) { return Math.max(6, Math.min(18, 6 + (d.reputation || 0) * 2.5)); })
        .attr("fill", function(d) { return statusColor[d.status] || statusColor.unknown; })
        .attr("stroke", "var(--border)")
        .attr("stroke-width", 1.5)
        .style("cursor", "pointer");

      node.append("text")
        .text(function(d) { return d.name || d.id.slice(0, 10); })
        .attr("text-anchor", "middle")
        .attr("dy", function(d) { return Math.max(6, Math.min(18, 6 + (d.reputation || 0) * 2.5)) + 14; })
        .attr("fill", "var(--text-dim)")
        .attr("font-size", "9px")
        .attr("font-family", "JetBrains Mono, monospace");

      // Click handler for profile view
      node.on("click", function(event, d) {
        var profile = document.getElementById("network-profile");
        if (!profile) return;
        profile.innerHTML =
          '<div style="margin-bottom:0.5rem"><strong style="color:var(--text)">' + esc(d.name || d.id) + '</strong></div>' +
          '<div>ID: ' + esc(d.id) + '</div>' +
          (d.description ? '<div style="margin-top:0.25rem">' + esc(d.description) + '</div>' : '') +
          '<div style="margin-top:0.5rem">Status: <span style="color:' + (statusColor[d.status] || statusColor.unknown) + '">' + (d.status || "unknown") + '</span></div>' +
          '<div>Reputation: ' + (d.reputation || 0).toFixed(1) + '</div>' +
          '<div>Credits: ' + (d.credits || 0) + '</div>' +
          (d.skills && d.skills.length ? '<div style="margin-top:0.5rem">Skills: ' + d.skills.map(function(s){return '<span style="background:rgba(255,51,51,0.1);color:var(--accent);padding:1px 6px;border-radius:8px;font-size:0.65rem;margin:1px">' + esc(s) + '</span>';}).join(" ") + '</div>' : '') +
          (d.interests && d.interests.length ? '<div style="margin-top:0.25rem">Interests: ' + d.interests.map(function(s){return '<span style="background:rgba(68,136,255,0.1);color:var(--blue);padding:1px 6px;border-radius:8px;font-size:0.65rem;margin:1px">' + esc(s) + '</span>';}).join(" ") + '</div>' : '') +
          (d.capabilities && d.capabilities.length ? '<div style="margin-top:0.25rem">Capabilities: ' + d.capabilities.map(function(s){return '<span style="background:rgba(187,136,255,0.1);color:var(--purple);padding:1px 6px;border-radius:8px;font-size:0.65rem;margin:1px">' + esc(s) + '</span>';}).join(" ") + '</div>' : '') +
          '<div style="margin-top:0.75rem"><a style="color:var(--accent);font-size:0.7rem;cursor:pointer" onclick="navigate(\'#/agents/' + d.id + '\')">View Full Profile</a></div>';
      });

      // Hover tooltips
      node.on("mouseenter", function(event, d) {
        d3.select(this).select("circle").attr("stroke", "var(--accent)").attr("stroke-width", 2.5);
      }).on("mouseleave", function() {
        d3.select(this).select("circle").attr("stroke", "var(--border)").attr("stroke-width", 1.5);
      });

      simulation.on("tick", function() {
        link.attr("x1", function(d) { return d.source.x; }).attr("y1", function(d) { return d.source.y; })
            .attr("x2", function(d) { return d.target.x; }).attr("y2", function(d) { return d.target.y; });
        node.attr("transform", function(d) { return "translate(" + d.x + "," + d.y + ")"; });
      });
    }

    function connectNetworkWS() {
      try {
        var wsUrl = API.replace("https://", "wss://").replace("http://", "ws://") + "/v1/network/ws";
        var ws = new WebSocket(wsUrl);
        ws.onmessage = function(event) {
          try {
            var msg = JSON.parse(event.data);
            if (msg.type === "ping") { ws.send(JSON.stringify({type:"pong"})); return; }
            var feed = document.getElementById("network-feed");
            if (feed && msg.type !== "connected") {
              var entry = '<div style="padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.04)">' +
                '<span style="color:var(--text-dim);font-size:0.65rem">' + new Date().toLocaleTimeString() + '</span> ' +
                esc(msg.type || "event") +
                '</div>';
              feed.innerHTML = entry + feed.innerHTML;
              if (feed.children.length > 50) feed.removeChild(feed.lastChild);
            }
          } catch(e) {}
        };
        ws.onerror = function() {};
        ws.onclose = function() { setTimeout(connectNetworkWS, 5000); };
      } catch(e) {}
    }
  }

  // ── Overview Page ──
  function renderOverview(app) {
    if (window._activityTimer) { clearInterval(window._activityTimer); window._activityTimer = null; }
    if (!user) {
      api("GET", "/v1/auth/me").then(function(me) { user = me; renderOverview(app); })
        .catch(function() { token = null; navigate("#/login"); });
      app.innerHTML = '<div class="loading-page"><span class="spinner"></span></div>';
      return;

    app.innerHTML =
      '<div class="dashboard-shell">' +
      renderSidebar("overview") +
      '<div class="main-content">' +
      '<div class="page">' +
      renderBreadcrumb([{label:"MoltGrid",hash:"#/agents"},{label:"Activity"}]) +
      '<h1 style="margin-bottom:1.5rem">Account Overview</h1>' +
      '<div id="ov-content"><div class="loading-page"><span class="spinner"></span> Loading\u2026</div></div>' +
      '</div>' +
      '</div>' +
      '</div>' +

    api("GET", "/v1/user/overview").then(function(d) {

          '<td><span class="status-dot ' + dotCls + '" style="display:inline-block;margin-right:6px"></span>' + esc(a.name || a.agent_id) + '</td>' +
          '<td><span class="status-pill ' + (isOn ? "completed" : "failed") + '">' + esc(a.heartbeat_status || "unknown") + '</span></td>' +
          '<td>' + (a.heartbeat_at ? esc(timeAgo(a.heartbeat_at)) : '\u2014') + '</td>' +

      }).join("");

      ov.innerHTML =

        '<div class="ov-card"><div class="ov-val" style="color:var(--accent)">' + (d.total_agents || 0) + '</div><div class="ov-label">Total Agents</div></div>' +
        '<div class="ov-card"><div class="ov-val" style="color:#00ff88">' + (d.online_count || 0) + '</div><div class="ov-label">Online Now</div></div>' +
        '<div class="ov-card"><div class="ov-val" style="color:var(--purple)">' + ((t.messages_sent || 0) + (t.messages_received || 0)) + '</div><div class="ov-label">Total Messages</div></div>' +
        '<div class="ov-card"><div class="ov-val" style="color:#64c8ff">' + (t.jobs_completed || 0) + '</div><div class="ov-label">Jobs Completed</div></div>' +
        '<div class="ov-card"><div class="ov-val" style="color:var(--red)">' + (t.jobs_failed || 0) + '</div><div class="ov-label">Jobs Failed</div></div>' +
        '<div class="ov-card"><div class="ov-val" style="color:var(--yellow)">' + (t.memory_keys || 0) + '</div><div class="ov-label">Memory Keys</div></div>' +
        '</div>' +

        '<div class="section-title">30-Day Message Volume</div>' +
        '<div class="chart-card" style="margin-bottom:1.5rem"><div class="chart-wrap" style="height:160px"><canvas id="ov-chart-msg"></canvas></div></div>' +

        '<div class="section-title">30-Day Job Outcomes</div>' +
        '<div class="chart-card" style="margin-bottom:1.5rem"><div class="chart-wrap" style="height:160px"><canvas id="ov-chart-jobs"></canvas></div></div>' +

        '<div class="section-title">Agents</div>' +
        '<div class="chart-card" style="overflow-x:auto">' +
        '<table class="agents-table"><thead><tr>' +
        '<th>Agent</th><th>Status</th><th>Last Seen</th><th style="text-align:right">Requests</th>' +
        '</tr></thead><tbody>' + (agentRows || '<tr><td colspan="4" style="color:var(--text-dim);text-align:center">No agents yet</td></tr>') + '</tbody></table>' +
        '</div>';

      // Overview charts
      var msgLabels = (d.msg_chart || []).map(function(r) { return r.date.slice(5); });
      var ovMsgCtx = document.getElementById("ov-chart-msg");
      if (ovMsgCtx) {
        new Chart(ovMsgCtx, {
          type: "bar",
          data: { labels: msgLabels, datasets: [{ label: "Messages", data: (d.msg_chart || []).map(function(r) { return r.count; }), backgroundColor: "rgba(180,100,255,0.7)", borderRadius: 2 }] },

  // ── Billing Page ──
  function renderBilling(app) {
    if (window._activityTimer) { clearInterval(window._activityTimer); window._activityTimer = null; }

    if (!user) {
      api("GET", "/v1/auth/me").then(function(me) {
        user = me;
        renderBilling(app);
      }).catch(function() { token = null; navigate("#/login"); });
      app.innerHTML = '<div class="loading-page"><span class="spinner"></span> Loading\u2026</div>';
      return;
    }

    var tier = user.subscription_tier || "free";
    var maxCalls = user.max_api_calls || 10000;
    var maxAgents = user.max_agents || 1;
    var usagePct = maxCalls > 0 ? Math.min(100, Math.round((user.usage_count / maxCalls) * 100)) : 0;
    var barCls = usagePct >= 95 ? "red" : (usagePct >= 80 ? "yellow" : "green");

    var tierPrices = { free: "$0", hobby: "$5", team: "$25", scale: "$99" };

    app.innerHTML =
      '<div class="dashboard-shell">' +
      renderSidebar("billing") +
      '<div class="main-content">' +
      '<div class="page">' +
      renderBreadcrumb([{label:"MoltGrid",hash:"#/agents"},{label:"Billing"}]) +
      '<div class="dash-header"><h1>Billing & Plans</h1></div>' +
      '<div class="billing-grid">' +

      // Current Plan Card
      '<div class="plan-card">' +
      '<div class="plan-card-header"><div>' +
      '<div class="plan-name"><span class="tier-badge tier-' + esc(tier) + '" style="font-size:0.75rem;padding:4px 14px">' + esc(tier.toUpperCase()) + '</span> Current Plan</div>' +
      '</div><div class="plan-price">' + tierPrices[tier] + '<span class="period"> /month</span></div></div>' +

      '<div class="plan-detail">API Usage: ' + (user.usage_count || 0).toLocaleString() + ' / ' + (maxCalls > 999999998 ? '\u221e' : maxCalls.toLocaleString()) + ' calls this month</div>' +
      '<div class="usage-track" style="margin-bottom:0.75rem"><div class="usage-fill ' + barCls + '" style="width:' + usagePct + '%"></div></div>' +
      '<div class="plan-detail">Agents: ' + '<span id="billing-agent-count">\u2026</span>' + ' / ' + maxAgents + ' used</div>' +
      '</div>' +

      // Tiers grid (placeholder, filled async)
      '<div class="section-title">All Plans</div>' +
      '<div id="tiers-container"><div class="loading-page" style="min-height:10vh"><span class="spinner"></span> Loading plans\u2026</div></div>' +

      // Billing history
      '<div class="billing-history">' +
      '<div class="label">Billing History</div>' +
      '<div id="billing-history-content">' +
      (tier !== "free" ? '<p style="color:var(--text-dim);font-size:0.8rem">View invoices and manage payment methods in the Stripe portal.</p>' +
        '<button class="btn btn-ghost" id="portal-btn" style="margin-top:0.75rem">Open Stripe Portal</button>' :
        '<p style="color:var(--text-dim);font-size:0.8rem">No billing history yet. Upgrade to a paid plan to get started.</p>') +
      '</div></div>' +

      '</div></div>' +
      '</div></div></div>' +
      '<div class="modal-overlay" id="modal-overlay"><div class="modal" id="modal-content"></div></div>';

    // Wire up
    wireSidebar();
    document.getElementById("modal-overlay").onclick = function(e) {
      if (e.target.id === "modal-overlay") e.target.classList.remove("active");
    };

    var portalBtn = document.getElementById("portal-btn");
    if (portalBtn) {
      portalBtn.onclick = function() {
        portalBtn.disabled = true; portalBtn.textContent = "Opening\u2026";
        api("POST", "/v1/billing/portal").then(function(data) {
          if (data.portal_url) window.location.href = data.portal_url;
        }).catch(function(err) {
          window.alert("Portal error: " + (err.detail || "Stripe not configured"));
          portalBtn.disabled = false; portalBtn.textContent = "Open Stripe Portal";
        });
      };
    }

    // Load agent count
    api("GET", "/v1/user/agents").then(function(data) {
      var el = document.getElementById("billing-agent-count");
      if (el) el.textContent = (data.agents || []).length;
    }).catch(function() {});

    // Load pricing
    var tierOrder = ["free", "hobby", "team", "scale"];
    function isTierHigher(a, b) { return tierOrder.indexOf(a) > tierOrder.indexOf(b); }

    function openStripePortal() {
      api("POST", "/v1/billing/portal").then(function(data) {
        if (data.portal_url) window.location.href = data.portal_url;
      }).catch(function(err) {
        window.alert("Portal error: " + (err.detail || "Stripe not configured"));
      });
    }

    api("GET", "/v1/pricing").then(function(data) {
      var tiers = data.tiers || {};
      var container = document.getElementById("tiers-container");
      var tierColors = { free: "var(--text-dim)", hobby: "var(--blue)", team: "var(--purple)", scale: "var(--yellow)" };
      var html = '<div class="tiers-grid">';

      tierOrder.forEach(function(t) {
        var info = tiers[t];
        if (!info) return;
        var isCurrent = t === tier;
        var priceStr = info.price === 0 ? "Free" : "$" + info.price + '<span class="mo">/mo</span>';
        var callsStr = info.max_api_calls > 999999998 ? "Unlimited" : (info.max_api_calls / 1000000 >= 1 ? (info.max_api_calls / 1000000) + "M" : (info.max_api_calls / 1000) + "K");

        html += '<div class="tier-card' + (isCurrent ? " current" : "") + '">' +
          '<div class="tier-card-name" style="color:' + tierColors[t] + '">' + esc(t.charAt(0).toUpperCase() + t.slice(1)) + '</div>' +
          '<div class="tier-card-price">' + priceStr + '</div>' +
          '<ul class="tier-card-features">' +
          '<li>' + info.max_agents + ' agents</li>' +
          '<li>' + callsStr + ' API calls/month</li>';
        (info.features || []).forEach(function(f) { html += '<li>' + esc(f) + '</li>'; });
        html += '</ul>';

        if (isCurrent) {
          html += '<button class="btn btn-ghost" disabled>Current plan</button>';
        } else if (t === "free" && tier !== "free") {
          html += '<button class="btn btn-ghost tier-portal-btn" style="color:var(--red);border-color:rgba(255,68,68,0.3)">Downgrade to Free</button>';
        } else if (t === "free") {
          html += '<button class="btn btn-ghost" disabled>Current plan</button>';
        } else if (isTierHigher(t, tier)) {
          html += '<button class="btn btn-accent tier-checkout-btn" data-tier="' + t + '">Upgrade to ' + esc(t.charAt(0).toUpperCase() + t.slice(1)) + '</button>';
        } else {
          html += '<button class="btn btn-ghost tier-portal-btn">Switch to ' + esc(t.charAt(0).toUpperCase() + t.slice(1)) + '</button>';
        }
        html += '</div>';
      });

      html += '</div>';

      if (tier !== "free") {
        html += '<div style="text-align:center;margin-top:1.25rem;display:flex;gap:0.75rem;justify-content:center;flex-wrap:wrap">' +
          '<button class="btn btn-ghost" id="manage-sub-btn">Manage Subscription</button>' +
          '<button class="btn btn-ghost" id="cancel-sub-btn" style="color:var(--red);border-color:rgba(255,68,68,0.3)">Cancel Subscription</button>' +
          '</div>';
      }

      container.innerHTML = html;

      // Wire checkout buttons (upgrade via Stripe Checkout)
      document.querySelectorAll(".tier-checkout-btn").forEach(function(btn) {
        btn.onclick = function() {
          var t2 = this.getAttribute("data-tier");
          this.disabled = true; this.textContent = "Redirecting\u2026";
          startCheckout(t2);
        };
      });

      // Wire portal buttons (downgrade/switch via Stripe Portal)
      document.querySelectorAll(".tier-portal-btn").forEach(function(btn) {
        btn.onclick = function() {
          this.disabled = true; this.textContent = "Opening\u2026";
          openStripePortal();
        };
      });

      var manageBtn = document.getElementById("manage-sub-btn");
      if (manageBtn) manageBtn.onclick = function() {
        manageBtn.disabled = true; manageBtn.textContent = "Opening\u2026";
        openStripePortal();
      };

      var cancelBtn = document.getElementById("cancel-sub-btn");
      if (cancelBtn) cancelBtn.onclick = function() {
        if (!window.confirm("Are you sure you want to cancel your subscription?")) return;
        cancelBtn.disabled = true; cancelBtn.textContent = "Opening\u2026";
        openStripePortal();
      };
    }).catch(function(err) {
      document.getElementById("tiers-container").innerHTML =
        '<div class="alert alert-error">Failed to load pricing plans: ' + esc(err.detail || 'Unknown error') + '</div>';
    });
  }

  // ── Billing Success Page ──
  function renderBillingSuccess(app) {
    if (window._activityTimer) { clearInterval(window._activityTimer); window._activityTimer = null; }

    var tier = (user && user.subscription_tier) || "free";

    app.innerHTML =
      '<div class="result-container"><div class="result-card">' +
      '<div class="result-icon">\u2705</div>' +
      '<h1>Payment Successful!</h1>' +
      '<p class="subtitle" id="success-status">Refreshing your account\u2026</p>' +
      '<div class="spinner" style="margin:1rem auto;display:block;width:24px;height:24px"></div>' +
      '</div></div>';

    var attempts = 0;
    var maxAttempts = 10;
    var poll = setInterval(function() {
      attempts++;
      api("GET", "/v1/auth/me").then(function(me) {
        user = me;
        var newTier = me.subscription_tier || "free";
        if (newTier !== "free" || attempts >= maxAttempts) {
          clearInterval(poll);
          var statusEl = document.getElementById("success-status");
          if (statusEl) statusEl.textContent = "Plan updated to " + newTier.toUpperCase() + ". Redirecting\u2026";
          setTimeout(function() { navigate("#/agents"); }, 2000);
        }
      }).catch(function() {
        if (attempts >= maxAttempts) {
          clearInterval(poll);
          navigate("#/agents");
        }
      });
    }, 2000);
  }

  // ── Billing Cancel Page ──
  function renderBillingCancel(app) {
    if (window._activityTimer) { clearInterval(window._activityTimer); window._activityTimer = null; }

    app.innerHTML =
      '<div class="result-container"><div class="result-card">' +
      '<div class="result-icon">\uD83D\uDC4B</div>' +
      '<h1>No worries!</h1>' +
      '<p class="subtitle">Your free tier is still active. You can upgrade anytime.</p>' +
      '<button class="btn btn-accent" id="cancel-go" style="margin-top:0.5rem">Go to dashboard</button>' +
      '</div></div>';

    document.getElementById("cancel-go").onclick = function() { navigate("#/agents"); };
  }

  // ── Billing Failed Page (Task 3) ──
  function renderBillingFailed(app) {
    if (window._activityTimer) { clearInterval(window._activityTimer); window._activityTimer = null; }

    app.innerHTML =
      '<div class="result-container"><div class="result-card">' +
      '<div class="result-icon" style="color:#ef4444">&#10060;</div>' +
      '<h1 style="color:#ef4444">Payment Failed</h1>' +
      '<p class="subtitle">Your payment could not be processed. Please check your payment details and try again.</p>' +
      '<button class="btn btn-accent" id="failed-retry" style="margin-top:0.5rem">Try again \u2192</button>' +
      '</div></div>';

    document.getElementById("failed-retry").onclick = function() { navigate("#/billing"); };
  }

  // ── Sidebar renderer ──
  function renderSidebar(activeSection) {
    var tier = (user && user.subscription_tier) || "free";
    var tierColors = { free:"color:var(--text-dim);background:rgba(122,122,146,0.12);border:1px solid var(--border)", hobby:"color:var(--blue);background:rgba(68,136,255,0.1);border:1px solid rgba(68,136,255,0.2)", team:"color:var(--purple);background:rgba(187,136,255,0.1);border:1px solid rgba(187,136,255,0.2)", scale:"color:var(--yellow);background:rgba(255,204,0,0.1);border:1px solid rgba(255,204,0,0.2)" };
    var tierStyle = tierColors[tier] || tierColors.free;
    var items = [
      { id:"agents",   icon:"", label:"Agents",        hash:"#/agents" },
      { id:"overview", icon:"", label:"Activity",      hash:"#/overview" },
      { id:"network",  icon:"", label:"Network",       hash:"#/network" },
      { id:"billing",  icon:"", label:"Billing",       hash:"#/billing" },
      { id:"docs",     icon:"", label:"Docs",          href:"https://moltgrid.net/docs", external:true }
    ];
    var navHtml = items.map(function(it) {
      var isActive = it.id === activeSection;
      var cls = "sidebar-item" + (isActive ? " active" : "");
      if (it.external) {
        return '<a class="' + cls + '" href="' + it.href + '" target="_blank" rel="noopener">' + it.label + '</a>';
      }
      return '<div class="' + cls + '" data-nav="' + it.id + '" onclick="if(window._activityTimer){clearInterval(window._activityTimer);window._activityTimer=null;}navigate(\'' + it.hash + '\')">' +
        it.label + '</div>';
    }).join("");
    return '<div class="sidebar" id="mg-sidebar">' +
      '<div class="sidebar-logo" id="sidebar-logo"><img src="https://moltgrid.net/public/logo-full.png" alt="MoltGrid"></div>' +
      '<nav class="sidebar-nav">' + navHtml + '</nav>' +
      '<div class="sidebar-footer">' +
      '<div class="sf-email">' + esc((user && user.email) || "") + '</div>' +
      '<span class="sf-tier" style="' + tierStyle + '">' + esc(tier) + '</span>' +
      '<br><button class="sf-logout" id="sidebar-logout">Sign out</button>' +
      '</div></div>' +
      '<button class="sidebar-toggle" id="sidebar-toggle" aria-label="Menu">&#9776;</button>' +
      '<div class="sidebar-overlay" id="sidebar-overlay"></div>';
  }

  function wireSidebar() {
    var sidebar = document.getElementById("mg-sidebar");
    var toggle = document.getElementById("sidebar-toggle");
    var overlay = document.getElementById("sidebar-overlay");
    if (toggle) {
      toggle.onclick = function() {
        sidebar.classList.toggle("open");
        overlay.classList.toggle("active");
      };
    }
    if (overlay) {
      overlay.onclick = function() {
        sidebar.classList.remove("open");
        overlay.classList.remove("active");
      };
    }
    var logoutBtn = document.getElementById("sidebar-logout");
    if (logoutBtn) {
      logoutBtn.onclick = function() {
        if (window._activityTimer) { clearInterval(window._activityTimer); window._activityTimer = null; }
        localStorage.removeItem("mg_token"); token = null; user = null; navigate("#/login");
      };
    }
    var logoLink = document.getElementById("sidebar-logo");
    if (logoLink) { logoLink.onclick = function() { if (window._activityTimer) { clearInterval(window._activityTimer); window._activityTimer = null; } navigate("#/agents"); }; }
  }

  // ── Breadcrumb renderer ──
  function renderBreadcrumb(crumbs) {
    // crumbs: [{label, hash}] — last item has no hash (current)
    var parts = crumbs.map(function(c, i) {
      if (i < crumbs.length - 1) {
        return '<span class="bc-link" onclick="if(window._activityTimer){clearInterval(window._activityTimer);window._activityTimer=null;}navigate(\'' + c.hash + '\')">' + esc(c.label) + '</span>';
      }
      return '<span class="bc-current">' + esc(c.label) + '</span>';
    });
    return '<div class="breadcrumb">' + parts.join('<span class="bc-sep"> &rsaquo; </span>') + '</div>';
  }

  // ── Shared header renderer (kept for auth pages only — sidebar replaces it for authenticated pages) ──
  function renderHeader(tier) {
    return ''; // Header replaced by sidebar on auth pages
  }

  function wireHeader() {
    // No-op: wiring now done by wireSidebar
  }

  // ── Register new agent ──
  function doRegister() {
    var overlay = document.getElementById("modal-overlay");
    var mc = document.getElementById("modal-content");
    overlay.classList.add("active");
    mc.innerHTML =
      '<h2>Register New Agent</h2>' +
      '<p class="subtitle">Give your agent a name. You can rename it later from the agent page.</p>' +
      '<div style="margin-bottom:1rem;padding:0.75rem 1rem;background:#0d2a24;border:1px solid #2dd4bf44;border-radius:8px;display:flex;align-items:center;gap:0.75rem">' +
      '<span style="font-size:1.2rem">&#x1F99E;</span>' +
      '<div style="flex:1"><div style="color:#2dd4bf;font-weight:600;font-size:0.85rem">OpenClaw Quickstart</div><div style="color:#8b949e;font-size:0.78rem">Pre-configure an OpenClaw-compatible agent with recommended settings</div></div>' +
      '<button class="btn btn-ghost" id="reg-openclaw-btn" style="font-size:0.8rem;padding:0.3rem 0.75rem;border-color:#2dd4bf44;color:#2dd4bf">Use Template</button>' +
      '</div>' +
      '<div class="form-group">' +
      '<label>Agent Name</label>' +
      '<input type="text" id="new-agent-name" maxlength="64" placeholder="e.g. my-data-agent" autocomplete="off">' +
      '<div class="name-error" id="name-err"></div>' +
      '</div>' +
      '<div class="modal-actions">' +
      '<button class="btn btn-ghost" id="reg-cancel">Cancel</button>' +
      '<button class="btn btn-accent" id="reg-confirm">Create Agent</button>' +
      '</div>';

    var inp = document.getElementById("new-agent-name");
    var errEl = document.getElementById("name-err");
    inp.focus();

    document.getElementById("reg-openclaw-btn").onclick = function() {
      inp.value = "openclaw-agent";
      errEl.textContent = "";
      inp.focus();
    };

    document.getElementById("reg-cancel").onclick = function() {
      overlay.classList.remove("active");
    };

    function validateName(n) {
      if (!n) return "Name is required";
      if (n.length > 64) return "Max 64 characters";
      if (!/^[a-zA-Z0-9][a-zA-Z0-9 _\-]{0,63}$/.test(n)) return "Letters, numbers, spaces, hyphens, underscores only \u2014 must start with a letter or number";
      return "";
    }

    inp.oninput = function() { errEl.textContent = validateName(this.value.trim()); };

    document.getElementById("reg-confirm").onclick = function() {
      var name = inp.value.trim();
      var err = validateName(name);
      if (err) { errEl.textContent = err; inp.focus(); return; }
      var confirmBtn = this;
      confirmBtn.disabled = true; confirmBtn.textContent = "Registering\u2026";
      api("POST", "/v1/register", { name: name }).then(function(data) {
        overlay.classList.remove("active");
        showApiKeyModal(data.agent_id, data.api_key, name);
        return api("GET", "/v1/auth/me");
      }).then(function(me) {
        user = me;
      }).catch(function(e) {
        errEl.textContent = e.detail || "Registration failed";
        confirmBtn.disabled = false; confirmBtn.textContent = "Create Agent";
      });
    };

    inp.onkeydown = function(e) { if (e.key === "Enter") document.getElementById("reg-confirm").click(); };
  }

  // ── Modals ──
  function showRotateKeyModal(agentId) {
    var overlay = document.getElementById("modal-overlay");
    var mc = document.getElementById("modal-content");
    overlay.classList.add("active");

    // Step 1: Confirmation
    mc.innerHTML =
      '<h2>&#128273; Regenerate API Key</h2>' +
      '<p class="subtitle">Issue a brand-new API key for this agent.</p>' +
      '<div class="alert alert-error" style="margin:1rem 0;font-size:0.82rem;line-height:1.5">' +
      '<strong>\u26A0 Warning</strong><br>' +
      'The current API key will be <strong>immediately and permanently invalidated</strong>. ' +
      'Any code, scripts, or integrations using the old key will stop working right away. ' +
      'Make sure you update all usages with the new key.' +
      '</div>' +
      '<div class="modal-actions">' +
      '<button class="btn btn-ghost" id="rk-cancel">Cancel</button>' +
      '<button class="btn btn-accent" style="background:var(--red)" id="rk-confirm">Regenerate Key</button>' +
      '</div>';

    document.getElementById("rk-cancel").onclick = function() { overlay.classList.remove("active"); };

    document.getElementById("rk-confirm").onclick = function() {
      var btn = this;
      btn.disabled = true; btn.textContent = "Regenerating\u2026";

      api("POST", "/v1/user/agents/" + agentId + "/rotate-key").then(function(data) {
        var newKey = data.api_key;

        // Step 2: Show new key (one-time)
        mc.innerHTML =
          '<h2>&#128273; New API Key</h2>' +
          '<p class="warning-text">\u26A0 Save this key now \u2014 it will not be shown again.</p>' +
          '<div class="api-key-box" style="margin:1rem 0">' +
          '<span id="rk-key-text" style="word-break:break-all">' + esc(newKey) + '</span>' +
          '<button class="copy-btn" id="rk-copy">Copy</button>' +
          '</div>' +
          '<p style="font-size:0.75rem;color:var(--text-dim);margin-bottom:1rem">' +
          'Rotated at: ' + esc(data.rotated_at || new Date().toISOString()) +
          '</p>' +
          '<div class="modal-actions">' +
          '<button class="btn btn-accent" id="rk-done">Done \u2014 I saved my key</button>' +
          '</div>';

        document.getElementById("rk-copy").onclick = function() {
          navigator.clipboard.writeText(newKey);
          this.textContent = "Copied!";
          var self = this;
          setTimeout(function() { self.textContent = "Copy"; }, 2000);
        };

        document.getElementById("rk-done").onclick = function() {
          overlay.classList.remove("active");
          showToast("API key regenerated. Old key is now invalid.", "success");

          // Prepend to activity feed immediately
          var list = document.getElementById("activity-list");
          if (list) {
            var div = document.createElement("div");
            div.className = "activity-item";
            div.innerHTML =
              '<div class="activity-icon">&#128273;</div>' +
              '<div class="activity-text">API key regenerated</div>' +
              '<div class="activity-time">just now</div>';
            list.insertBefore(div, list.firstChild);
          }
        };
      }).catch(function(err) {
        mc.innerHTML =
          '<h2>&#128273; Regenerate API Key</h2>' +
          '<div class="alert alert-error" style="margin:1rem 0">' + esc(err.detail || "Failed to regenerate key") + '</div>' +
          '<div class="modal-actions"><button class="btn btn-ghost" id="rk-cancel">Close</button></div>';
        document.getElementById("rk-cancel").onclick = function() { overlay.classList.remove("active"); };
      });
    };
  }

  function showRenameModal(agentId, currentName) {
    var overlay = document.getElementById("modal-overlay");
    var mc = document.getElementById("modal-content");
    overlay.classList.add("active");
    mc.innerHTML =
      '<h2>Rename Agent</h2>' +
      '<p class="subtitle" style="font-family:monospace;font-size:0.75rem;color:var(--text-dim);">' + esc(agentId) + '</p>' +
      '<div class="form-group">' +
      '<label>New Name</label>' +
      '<input type="text" id="rename-input" maxlength="64" value="' + esc(currentName) + '" autocomplete="off">' +
      '<div class="name-error" id="rename-err"></div>' +
      '</div>' +
      '<div class="modal-actions">' +
      '<button class="btn btn-ghost" id="rename-cancel">Cancel</button>' +
      '<button class="btn btn-accent" id="rename-save">Save Name</button>' +
      '</div>';

    var inp = document.getElementById("rename-input");
    var errEl = document.getElementById("rename-err");
    inp.focus(); inp.select();

    function validate(n) {
      if (!n) return "Name is required";
      if (n.length > 64) return "Max 64 characters";
      if (!/^[a-zA-Z0-9][a-zA-Z0-9 _\-]{0,63}$/.test(n)) return "Letters, numbers, spaces, hyphens, underscores only \u2014 must start with a letter or number";
      return "";
    }
    inp.oninput = function() { errEl.textContent = validate(this.value.trim()); };

    document.getElementById("rename-cancel").onclick = function() { overlay.classList.remove("active"); };

    document.getElementById("rename-save").onclick = function() {
      var name = inp.value.trim();
      var err = validate(name);
      if (err) { errEl.textContent = err; inp.focus(); return; }
      var btn = this;
      btn.disabled = true; btn.textContent = "Saving\u2026";
      api("PATCH", "/v1/user/agents/" + agentId, { name: name }).then(function() {
        overlay.classList.remove("active");
        renderAgentDetail(document.getElementById("app"), agentId);
      }).catch(function(e) {
        errEl.textContent = e.detail || "Failed to rename";
        btn.disabled = false; btn.textContent = "Save Name";
      });
    };

    inp.onkeydown = function(e) { if (e.key === "Enter") document.getElementById("rename-save").click(); };
  }

  function showApiKeyModal(agentId, apiKey, agentName) {
    var overlay = document.getElementById("modal-overlay");
    var mc = document.getElementById("modal-content");
    overlay.classList.add("active");
    mc.innerHTML =
      '<h2>Agent Registered</h2>' +
      '<p class="subtitle"><strong>' + esc(agentName || agentId) + '</strong> is ready.' +
      (agentName ? ' <span style="font-family:monospace;color:var(--text-dim);font-size:0.75em;">' + esc(agentId) + '</span>' : '') + '</p>' +
      '<p class="warning-text">\u26A0 Save this API key now \u2014 it cannot be recovered.</p>' +
      '<div class="api-key-box"><span id="key-text">' + esc(apiKey) + '</span>' +
      '<button class="copy-btn" id="copy-key">Copy</button></div>' +
      '<div class="modal-actions">' +
      '<button class="btn btn-accent" id="modal-done">Done</button></div>';

    document.getElementById("copy-key").onclick = function() {
      navigator.clipboard.writeText(apiKey);
      this.textContent = "Copied!";
      var self = this;
      setTimeout(function() { self.textContent = "Copy"; }, 2000);
    };
    document.getElementById("modal-done").onclick = function() {
      overlay.classList.remove("active");
      renderAgents(document.getElementById("app"));
    };
  }

  function showUpgradeModal() {
    var overlay = document.getElementById("modal-overlay");
    var mc = document.getElementById("modal-content");
    overlay.classList.add("active");
    mc.innerHTML =
      '<h2>Upgrade Your Plan</h2>' +
      '<p class="subtitle">Free tier is limited to 1 agent. Upgrade to unlock more.</p>' +
      '<div style="display:grid;gap:0.75rem;margin:1.25rem 0">' +
      '<div class="agent-card" style="cursor:pointer" id="ck-hobby">' +
      '<div style="display:flex;justify-content:space-between;align-items:center">' +
      '<div><strong>Hobby</strong> \u2014 10 agents, 1M API calls</div>' +
      '<div style="color:var(--accent);font-family:JetBrains Mono,monospace;font-weight:700">$5/mo</div></div></div>' +
      '<div class="agent-card" style="cursor:pointer" id="ck-team">' +
      '<div style="display:flex;justify-content:space-between;align-items:center">' +
      '<div><strong>Team</strong> \u2014 50 agents, 10M API calls</div>' +
      '<div style="color:var(--purple);font-family:JetBrains Mono,monospace;font-weight:700">$25/mo</div></div></div>' +
      '<div class="agent-card" style="cursor:pointer" id="ck-scale">' +
      '<div style="display:flex;justify-content:space-between;align-items:center">' +
      '<div><strong>Scale</strong> \u2014 200 agents, unlimited</div>' +
      '<div style="color:var(--yellow);font-family:JetBrains Mono,monospace;font-weight:700">$99/mo</div></div></div></div>' +
      '<div class="modal-actions">' +
      '<button class="btn btn-ghost" id="modal-cancel">Cancel</button>' +
      '<button class="btn btn-ghost" id="modal-billing">View all plans</button></div>';

    document.getElementById("modal-cancel").onclick = function() { overlay.classList.remove("active"); };
    document.getElementById("modal-billing").onclick = function() { overlay.classList.remove("active"); navigate("#/billing"); };
    ["hobby","team","scale"].forEach(function(t) {
      document.getElementById("ck-" + t).onclick = function() { startCheckout(t); };
    });
  }

  function startCheckout(tier) {
    api("POST", "/v1/billing/checkout", { tier: tier }).then(function(data) {
      if (data.checkout_url) window.location.href = data.checkout_url;
    }).catch(function(err) {
      window.alert("Checkout error: " + (err.detail || "Stripe not configured"));
    });
  }

  // ── Init ──
  if (token) {
    api("GET", "/v1/auth/me").then(function(me) {
      user = me; route();
    }).catch(function() {
      localStorage.removeItem("mg_token"); token = null; route();
    });
  } else { route(); }
})();
</script>
